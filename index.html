<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ff8b6a" />
  <meta name="description" content="短影音收藏中心" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="短影音收藏中心" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg?v=20260723-2" />
  <link rel="shortcut icon" href="./icon.svg?v=20260723-2" />
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png?v=20260723-2" />
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="./apple-touch-icon.png?v=20260723-2" />
  <title>短影音收藏中心</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Noto Sans TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg: #fff8f1;
      --surface: #ffffff;
      --surface-soft: #fffdf9;
      --coral: #ff8066;
      --coral-deep: #df5f4d;
      --coral-soft: #ffe5de;
      --orange: #ffad2f;
      --yellow: #ffd66b;
      --mint: #63c9a6;
      --mint-deep: #2f9a78;
      --mint-soft: #ddf6ec;
      --sky: #62afe9;
      --purple: #8a77df;
      --pink: #e96d9b;
      --text: #383641;
      --text-strong: #26242c;
      --muted: #7b7784;
      --line: #ece2d9;
      --danger: #c84646;
      --danger-soft: #ffe4e4;
      --shadow: 0 10px 30px rgba(92, 61, 43, .10);
      --shadow-float: 0 16px 36px rgba(255, 128, 102, .22);
      --radius: 18px;
      --radius-lg: 26px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }
    body { min-width: 320px; -webkit-font-smoothing: antialiased; }
    button, input, select, textarea { font: inherit; font-size: 16px; }
    html, body { touch-action: manipulation; overscroll-behavior-y: none; }
    button { cursor: pointer; }
    img { max-width: 100%; }
    a { color: inherit; }
    .hidden { display: none !important; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }

    body::before, body::after {
      content: "";
      position: fixed;
      z-index: -2;
      width: 230px;
      height: 230px;
      border-radius: 999px;
      filter: blur(4px);
      opacity: .52;
      pointer-events: none;
    }
    body::before { background: #ffe1d3; top: -90px; right: -90px; }
    body::after { background: #d8f4e7; left: -110px; bottom: 80px; }

    .boot, .login-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .boot-inner { display: grid; justify-items: center; gap: 12px; }
    .brand-mark {
      display: grid;
      place-items: center;
      overflow: hidden;
      background: transparent;
      box-shadow: var(--shadow-float);
      transform: none;
    }
    .brand-mark img { width: 100%; height: 100%; display: block; object-fit: cover; }
    .boot .brand-mark { width: 76px; height: 76px; border-radius: 25px; font-size: 30px; }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255,128,102,.2);
      border-top-color: var(--coral);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .login-card {
      width: min(430px, 100%);
      padding: 30px 24px;
      text-align: center;
      background: rgba(255,255,255,.95);
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow: var(--shadow);
    }
    .login-card .brand-mark { width: 82px; height: 82px; border-radius: 26px; margin: 0 auto 18px; font-size: 32px; }
    .login-card h1 { margin: 0; color: var(--text-strong); }
    .login-card p { line-height: 1.7; color: var(--muted); }
    .google-btn { width: 100%; margin-top: 12px; background: white; border-color: #d9d5d0; }

    .app-shell { min-height: 100vh; padding-bottom: calc(68px + env(safe-area-inset-bottom)); }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      min-height: 64px;
      padding: calc(9px + env(safe-area-inset-top)) 15px 9px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(255,248,241,.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(236,226,217,.92);
    }
    .top-title { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .top-title .brand-mark { width: 42px; height: 42px; border-radius: 14px; font-size: 16px; flex: 0 0 auto; }
    .top-copy { min-width: 0; }
    .top-copy strong { display: block; color: var(--text-strong); font-size: 18px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top-subrow { display: flex; align-items: center; gap: 8px; min-width: 0; margin-top: 1px; }
    .top-subrow small { display: block; min-width: 0; font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .topbar-wishlist { width: 30px; min-width: 30px; height: 30px; min-height: 30px; padding: 0; border-radius: 10px; flex: 0 0 auto; }
    .topbar-wishlist svg { width: 17px; height: 17px; fill: none; stroke: currentColor; }
    .topbar-wishlist.active { color: #ffffff; background: #f4b942; border-color: #d99516; box-shadow: 0 5px 12px rgba(217,149,22,.22); }
    .topbar-wishlist.active svg { fill: #ffffff; stroke: #ffffff; }
    .page { width: min(1040px, 100%); margin: 0 auto; padding: 14px 14px 28px; }

    .bottom-nav {
      position: fixed !important;
      z-index: 180;
      left: 0;
      right: 0;
      bottom: 0 !important;
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3px;
      padding: 3px 8px calc(2px + env(safe-area-inset-bottom));
      border: 1px solid rgba(236,226,217,.95);
      border-bottom: 0;
      border-radius: 22px 22px 0 0;
      background: rgba(255,255,255,.985);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 -7px 24px rgba(91,59,43,.13);
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
      will-change: transform;
      isolation: isolate;
    }
    .nav-item {
      border: 0;
      background: transparent;
      color: var(--muted);
      min-height: 49px;
      border-radius: 18px;
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 2px;
      font-size: 11px;
      font-weight: 700;
    }
    .nav-item svg { width: 23px; height: 23px; }
    .nav-item.active { color: var(--coral-deep); background: var(--coral-soft); }
    .nav-item.add-nav { color: white; background: linear-gradient(145deg, var(--coral), var(--orange)); box-shadow: 0 8px 18px rgba(255,128,102,.28); }
    .nav-item:active { transform: scale(.97); }

    .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
    .panel { padding: 16px; }
    .hero {
      position: relative;
      overflow: hidden;
      padding: 18px;
      margin-bottom: 14px;
      border-radius: 24px;
      color: white;
      background: linear-gradient(125deg, var(--coral), var(--orange) 62%, var(--yellow));
      box-shadow: var(--shadow-float);
    }
    .hero::after { content: ""; position: absolute; width: 130px; height: 130px; border-radius: 50%; background: rgba(255,255,255,.20); right: -35px; top: -50px; }
    .hero h1 { position: relative; z-index: 1; margin: 0; font-size: 24px; }
    .hero p { position: relative; z-index: 1; margin: 7px 0 0; font-size: 14px; line-height: 1.6; }
    .hero-stats { position: relative; z-index: 1; display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .hero-stat { padding: 7px 10px; background: rgba(255,255,255,.2); border-radius: 999px; font-size: 12px; font-weight: 800; }

    .toolbar { display: flex; flex-wrap: wrap; gap: 9px; align-items: center; margin-bottom: 12px; }
    .home-toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 48px 48px;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }
    .home-toolbar .home-wishlist,
    .home-sort-button { width: 48px; min-width: 48px; height: 44px; min-height: 44px; padding: 0; }
    .home-sort-wrap { position: relative; width: 48px; min-width: 48px; }
    .home-sort-button svg { width: 20px; height: 20px; }
    .home-sort-menu {
      position: absolute;
      z-index: 90;
      top: calc(100% + 7px);
      right: 0;
      width: 150px;
      display: none;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.99);
      box-shadow: 0 14px 32px rgba(49,40,35,.18);
    }
    .home-sort-menu.show { display: grid; gap: 3px; }
    .home-sort-option {
      width: 100%;
      min-height: 40px;
      padding: 8px 9px;
      border: 0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--text);
      background: transparent;
      text-align: left;
      font-size: 13px;
      font-weight: 800;
    }
    .home-sort-option:hover,
    .home-sort-option:active { background: #fff4ec; }
    .home-sort-option.active { color: var(--coral-deep); background: var(--coral-soft); }
    .home-sort-option svg { width: 16px; height: 16px; opacity: 0; flex: 0 0 auto; }
    .home-sort-option.active svg { opacity: 1; }
    .search-wrap { position: relative; flex: 1 1 220px; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--muted); }
    .search-wrap input { padding-left: 39px; }
    input, select, textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid #e5d9cf;
      border-radius: 13px;
      background: #fffdfa;
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }
    textarea { min-height: 96px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: var(--coral); box-shadow: 0 0 0 4px rgba(255,128,102,.12); background: white; }
    label.field { display: grid; gap: 6px; color: var(--text-strong); font-weight: 800; font-size: 14px; }
    label.field small { color: var(--muted); font-weight: 400; line-height: 1.5; }
    .form-grid { display: grid; gap: 13px; }
    .form-grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .form-section { padding: 15px; border: 1px solid var(--line); border-radius: 18px; background: var(--surface-soft); }
    .section-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .section-title { display: flex; align-items: center; gap: 9px; }
    .section-title h2, .section-title h3 { margin: 0; color: var(--text-strong); }
    .section-icon { width: 38px; height: 38px; display: grid; place-items: center; border-radius: 13px; color: var(--coral-deep); background: var(--coral-soft); }
    .section-icon svg { width: 20px; height: 20px; }

    .btn {
      min-height: 42px;
      padding: 9px 13px;
      border: 1px solid transparent;
      border-radius: 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-weight: 800;
      text-decoration: none;
    }
    .btn svg { width: 17px; height: 17px; }
    .btn-primary { color: white; background: linear-gradient(135deg, var(--coral), var(--orange)); box-shadow: 0 8px 18px rgba(255,128,102,.22); }
    .btn-secondary { color: var(--text); background: white; border-color: var(--line); }
    .btn-soft { color: var(--mint-deep); background: var(--mint-soft); }
    .btn-danger { color: var(--danger); background: var(--danger-soft); }
    .btn-icon { width: 40px; min-width: 40px; padding: 0; }
    .btn-small { min-height: 34px; padding: 6px 10px; border-radius: 11px; font-size: 12px; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .form-actions { display: flex; justify-content: flex-end; gap: 9px; flex-wrap: wrap; margin-top: 15px; }

    .chips { display: flex; gap: 7px; overflow-x: auto; padding: 2px 0 8px; }
    .chip { flex: 0 0 auto; border: 1px solid var(--line); background: white; color: var(--muted); padding: 7px 11px; border-radius: 999px; font-size: 12px; font-weight: 800; }
    .chip.active { color: white; background: var(--chip-color, var(--coral)); border-color: transparent; }

    .bookmark-list { display: grid; gap: 10px; }
    .bookmark-row {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      gap: 11px;
      padding: 10px;
      overflow: hidden;
    }
    .bookmark-thumb {
      width: 88px;
      height: 88px;
      border-radius: 15px;
      overflow: hidden;
      background: #f2eee9;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }
    .bookmark-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .platform-fallback {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: grid;
      place-items: center;
      color: white;
      background: var(--platform-bg, linear-gradient(145deg, var(--coral), var(--orange)));
      font-weight: 900;
    }
    .platform-logo {
      position: relative;
      z-index: 2;
      width: 54%;
      height: 54%;
      object-fit: contain;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,.14));
    }
    .platform-logo-letter {
      position: absolute;
      z-index: 1;
      font-size: 24px;
      font-weight: 900;
      opacity: .94;
      display: none;
    }
    .platform-name {
      position: absolute;
      z-index: 3;
      left: 5px;
      right: 5px;
      bottom: 5px;
      font-size: 9px;
      text-align: center;
      opacity: .92;
      display: none;
    }
    .platform-fallback.logo-failed .platform-logo-letter,
    .platform-fallback.logo-failed .platform-name { display: block; }
    .bookmark-content { position: relative; min-width: 0; display: grid; gap: 5px; align-content: start; padding-right: 35px; }
    .bookmark-title { margin: 0; color: var(--text-strong); font-size: 15px; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .bookmark-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 4px 8px;
      overflow: visible;
      white-space: normal;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }
    .meta-item { display: inline-flex; align-items: flex-start; gap: 4px; min-width: 0; max-width: 100%; white-space: normal; }
    .meta-item svg { width: 13px; height: 13px; flex: 0 0 auto; margin-top: 1px; }
    .meta-text { min-width: 0; overflow-wrap: anywhere; word-break: break-word; }
    .category-pill { display: inline-flex; align-items: center; gap: 5px; flex: 0 0 auto; color: var(--category-color); font-weight: 800; line-height: 1.45; }
    .bookmark-category-badge {
      position: absolute;
      top: -1px;
      right: 0;
      width: 29px;
      height: 29px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      color: white;
      background: var(--category-color, #9a96a1);
      box-shadow: 0 4px 11px color-mix(in srgb, var(--category-color, #9a96a1) 30%, transparent);
    }
    .bookmark-category-badge svg { width: 17px; height: 17px; }
    .wishlist-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex: 0 0 auto;
      color: #b96d09;
      font-weight: 800;
      line-height: 1.45;
    }
    .wishlist-badge svg { width: 13px; height: 13px; fill: #f4b942; stroke: #d58b12; }
    .wishlist-control {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      padding: 12px;
      border: 1px solid #f4dcc0;
      border-radius: 15px;
      background: #fff8e8;
      color: var(--text-strong);
      cursor: pointer;
    }
    .wishlist-control input { width: 21px; height: 21px; min-height: 0; margin: 1px 0 0; accent-color: var(--orange); flex: 0 0 auto; }
    .wishlist-control strong { display: block; font-size: 14px; }
    .wishlist-label { display: inline-flex; align-items: center; gap: 7px; min-width: 0; }
    .wishlist-label svg { width: 18px; height: 18px; flex: 0 0 auto; fill: #f4b942; stroke: #d58b12; }
    .wishlist-control small { display: block; margin-top: 2px; color: var(--muted); font-weight: 400; line-height: 1.45; }
    .home-wishlist, .map-wishlist { width: 48px; min-width: 48px; padding: 0; }
    .home-wishlist svg, .map-wishlist svg { fill: none; stroke: currentColor; }
    .home-wishlist.active, .map-wishlist.active {
      color: #ffffff;
      background: #f4b942;
      border-color: #d99516;
      box-shadow: 0 7px 16px rgba(217,149,22,.24);
    }
    .home-wishlist.active svg, .map-wishlist.active svg { fill: #ffffff; stroke: #ffffff; }
    .meta-tags { display: inline-flex; flex: 0 1 auto; flex-wrap: wrap; align-items: center; gap: 4px 6px; min-width: 0; max-width: 100%; color: var(--muted); white-space: normal; line-height: 1.45; }
    .meta-tag { display: inline-block; max-width: 100%; overflow-wrap: anywhere; word-break: break-word; }
    .bookmark-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
    .bookmark-actions .btn { min-height: 38px; padding: 0; font-size: 11px; }
    .bookmark-actions .btn-icon { width: 38px; min-width: 38px; height: 38px; padding: 0; }
    .bookmark-actions .btn-icon svg { width: 20px; height: 20px; }

    .empty { padding: 34px 18px; text-align: center; color: var(--muted); }
    .empty svg { width: 46px; height: 46px; color: var(--mint); margin: 0 auto 10px; }

    .form-card { overflow: hidden; }
    .form-banner { padding: 17px; color: white; background: linear-gradient(120deg, var(--coral), var(--orange)); }
    .form-banner h2 { margin: 0; font-size: 20px; }
    .form-banner p { margin: 5px 0 0; font-size: 13px; opacity: .95; }
    .form-body { padding: 14px; }
    .place-tools { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 12px; }
    .place-tools .btn { width: 100%; min-width: 0; }
    .link-fetch-row { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 8px; align-items: end; }
    .metadata-status { min-height: 20px; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .metadata-preview {
      display: grid;
      grid-template-columns: 58px minmax(0,1fr);
      gap: 10px;
      align-items: center;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fffdfa;
    }
    .metadata-preview-thumb {
      width: 58px;
      height: 58px;
      border-radius: 12px;
      overflow: hidden;
      background: #f1ece6;
    }
    .metadata-preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .metadata-preview-copy { min-width: 0; }
    .metadata-preview-copy strong { display: block; color: var(--text-strong); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .metadata-preview-copy small { display: block; margin-top: 3px; color: var(--muted); line-height: 1.4; }
    .advanced-details { border: 1px solid var(--line); border-radius: 14px; background: #fffdfa; }
    .advanced-details summary { padding: 10px 12px; color: var(--muted); font-size: 12px; font-weight: 800; cursor: pointer; }
    .advanced-details > div { padding: 0 12px 12px; }
    .place-autocomplete-wrap { position: relative; }
    .place-suggestions {
      position: absolute;
      z-index: 120;
      left: 0;
      right: 0;
      top: calc(100% + 4px);
      display: none;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      box-shadow: 0 14px 32px rgba(49,40,35,.18);
    }
    .place-suggestions.show { display: block; }
    .place-suggestion {
      width: 100%;
      padding: 10px 12px;
      border: 0;
      border-bottom: 1px solid #f0e9e3;
      display: flex;
      align-items: flex-start;
      gap: 9px;
      color: var(--text);
      background: white;
      text-align: left;
    }
    .place-suggestion:last-of-type { border-bottom: 0; }
    .place-suggestion:active { background: var(--mint-soft); }
    .place-suggestion svg { width: 18px; height: 18px; color: var(--mint-deep); flex: 0 0 auto; margin-top: 1px; }
    .place-suggestion span { min-width: 0; line-height: 1.35; }
    .place-suggestion small { display: block; margin-top: 2px; color: var(--muted); }
    .google-attribution { padding: 6px 10px; color: var(--muted); background: #faf8f5; font-size: 10px; text-align: right; }
    .coordinate-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: end; }
    .coordinate-row .btn { min-width: 86px; }
    .map-provider-note { margin: 8px 2px 0; color: var(--muted); font-size: 12px; line-height: 1.55; }
    .place-picker { margin-top: 12px; border: 1px solid #cfe9de; border-radius: 18px; overflow: hidden; background: #edf7f2; }
    .place-search { padding: 10px; background: #f7fcf9; border-bottom: 1px solid #cfe9de; }
    .place-map { min-height: 310px; background: #edf4f0; }

      [state.categories[index], state.categories[nextIndex]] = [state.categories[nextIndex], state.categories[index]];
      await saveCategoryOrder();

    async function queryNearby(center, radiusKm) {
      const bounds = geohashQueryBounds([Number(center.latitude), Number(center.longitude)], Number(radiusKm) * 1000);
      const snapshots = await Promise.all(bounds.map(([start, end]) => getDocs(
        query(bookmarksRef(), orderBy("location.geohash"), startAt(start), endAt(end))
      )));
      const unique = new Map();
      snapshots.forEach((snapshot) => snapshot.docs.forEach((item) => {
        const bookmark = { id: item.id, ...item.data() };
        if (bookmark.hasLocation && bookmark.location?.latitude != null && bookmark.location?.longitude != null) unique.set(bookmark.id, bookmark);
      }));
      return [...unique.values()].map((bookmark) => ({
        ...bookmark,
        distanceKm: distanceBetween(
          [center.latitude, center.longitude],
          [Number(bookmark.location.latitude), Number(bookmark.location.longitude)]
        )
      })).filter((bookmark) => bookmark.distanceKm <= radiusKm).sort((a, b) => a.distanceKm - b.distanceKm);
    }

    function normalizeUrl(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      try {
        const url = new URL(raw);
        url.hash = "";
        [...url.searchParams.keys()].forEach((key) => {
          if (key.startsWith("utm_") || ["fbclid", "gclid", "igsh", "mibextid"].includes(key)) url.searchParams.delete(key);
        });
        return url.toString().replace(/\/$/, "");
      } catch { return raw; }
    }

    function detectPlatform(value) {
      try {
        const parsed = new URL(value);
        const host = parsed.hostname.toLowerCase();
        const path = parsed.pathname.toLowerCase();
        if (host.includes("threads.net") || host.includes("threads.com")) return "threads";
        if (host.includes("instagram.com")) return "instagram";
        if (host.includes("facebook.com") || host.includes("fb.watch")) return "facebook";
        if (host.includes("xiaohongshu.com") || host.includes("xhslink.com")) return "xiaohongshu";
        if (host.includes("tiktok.com")) return "tiktok";
        if (host.includes("youtube.com") || host.includes("youtu.be")) return "youtube";
        if (host === "maps.app.goo.gl" || host === "goo.gl" || (host.includes("google.") && path.includes("/maps"))) return "googlemaps";
      } catch {}
      return "other";
    }

    function inferThumbnailUrl(url, platform) {
      if (platform !== "youtube") return "";
      try {
        const parsed = new URL(url);
        let videoId = "";
        if (parsed.hostname.includes("youtu.be")) videoId = parsed.pathname.split("/").filter(Boolean)[0] || "";
        if (parsed.hostname.includes("youtube.com")) {
          videoId = parsed.searchParams.get("v") || "";
          if (!videoId && parsed.pathname.includes("/shorts/")) videoId = parsed.pathname.split("/shorts/")[1]?.split("/")[0] || "";
        }
        return videoId ? `https://i.ytimg.com/vi/${encodeURIComponent(videoId)}/hqdefault.jpg` : "";
      } catch { return ""; }
    }

    async function fetchYouTubeMetadata(url) {
      const endpoint = `https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`;
      const response = await fetch(endpoint, { headers: { Accept: "application/json" } });
      if (!response.ok) throw new Error("YouTube 無法讀取這個公開連結。");
      const data = await response.json();
      return {
        platform: "youtube",
        title: String(data.title || "").trim(),
        thumbnailUrl: String(data.thumbnail_url || inferThumbnailUrl(url, "youtube") || "").trim(),
        source: "YouTube oEmbed"
      };
    }

    async function fetchMetadataFromFunction(url) {
      const fallbackEndpoint = "https://fetch-video-metadata-774442944506.asia-east1.run.app";
      const endpoint = String(CONFIG.metadataFunctionUrl || fallbackEndpoint)
        .trim()
        .replace(/\/+$/, "");
      if (!endpoint) throw new Error("Meta 公開內容讀取函式網址為空白。");

      const token = await auth.currentUser?.getIdToken(true);
      if (!token) throw new Error("請先登入。");

      let response;
      try {
        response = await fetch(endpoint, {
          method: "POST",
          mode: "cors",
          cache: "no-store",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({ url })
        });
      } catch (error) {
        console.error("metadata function network error", { endpoint, error });
        throw new Error("無法連線到雲端讀取函式。請確認 Cloud Run 已允許公開叫用、CORS 已包含 GitHub Pages 網域，並重新部署函式。");
      }

      const rawText = await response.text();
      let data = {};
      try { data = rawText ? JSON.parse(rawText) : {}; } catch {
        console.error("metadata function invalid response", { status: response.status, rawText });
        throw new Error("雲端函式回傳格式不正確。請確認函式進入點為 fetchVideoMetadata，而不是 helloHttp，並按「儲存並重新部署」。");
      }

      if (!response.ok) {
        throw new Error(data.error || `公開內容讀取失敗（${response.status}）。`);
      }
      return data;
    }

    async function fetchVideoMetadata(url) {
      const platform = detectPlatform(url);
      if (platform === "youtube") {
        try { return await fetchYouTubeMetadata(url); }
        catch (error) {
          const fallback = inferThumbnailUrl(url, platform);
          if (fallback) return { platform, title: "", thumbnailUrl: fallback, source: "YouTube 縮圖規則", warning: error.message };
          throw error;
        }
      }
      if (["instagram", "facebook", "threads"].includes(platform)) {
        const result = await fetchMetadataFromFunction(url);
        return { platform, ...result };
      }
      return {
        platform,
        title: "",
        thumbnailUrl: "",
        source: "平台手動輸入",
        warning: "此平台目前不提供自動標題與縮圖，請手動輸入標題。"
      };
    }

    function getCurrentPosition() {
      if (!navigator.geolocation) return Promise.reject(new Error("此瀏覽器不支援定位功能。"));
      return new Promise((resolve, reject) => navigator.geolocation.getCurrentPosition(
        (position) => resolve({ latitude: position.coords.latitude, longitude: position.coords.longitude }),
        (error) => reject(new Error({ 1: "定位權限被拒絕，請在瀏覽器設定中允許定位。", 2: "目前無法取得位置。", 3: "取得位置逾時。" }[error.code] || "無法取得目前位置。")),

      ));
    }

    let mapsPromise = null;
    function loadGoogleMaps() {
      if (window.google?.maps?.Map) return Promise.resolve(window.google.maps);
      if (mapsPromise) return mapsPromise;

      mapsPromise = new Promise((resolve, reject) => {
        const callback = `__mapsReady_${Date.now()}`;
        let settled = false;
        let authFailed = false;
        const finishReject = (message) => {
          if (settled) return;
          settled = true;
          mapsPromise = null;
          reject(new Error(message));
        };
        const timer = setTimeout(() => finishReject("Google Maps 載入逾時。請檢查帳單、Maps JavaScript API 與網站限制。"), 20000);

        const previousAuthFailure = window.gm_authFailure;
        window.gm_authFailure = () => {
          authFailed = true;
          clearTimeout(timer);
          finishReject("Google Maps 驗證失敗。請確認帳單已連結、Maps JavaScript API 已啟用，且 API 金鑰允許 https://baritone90064.github.io/*。");
          if (typeof previousAuthFailure === "function") previousAuthFailure();
        };

        window[callback] = () => {
          clearTimeout(timer);
          delete window[callback];
          setTimeout(() => {
            if (authFailed) return;
            if (!window.google?.maps?.Map) return finishReject("Google Maps 程式庫未正確載入。");
            if (settled) return;
            settled = true;
            resolve(window.google.maps);
          }, 250);
        };

        const script = document.createElement("script");
        const params = new URLSearchParams({
          key: CONFIG.googleMapsApiKey,
          v: "weekly",
          language: "zh-TW",
          region: "TW",
          callback,
          loading: "async"
        });
        script.src = `https://maps.googleapis.com/maps/api/js?${params.toString()}`;
        script.async = true;
        script.defer = true;
        script.onerror = () => {
          clearTimeout(timer);
          finishReject("Google Maps JavaScript 無法下載。");
        };
        document.head.append(script);
      });
      return mapsPromise;
    }

    let leafletPromise = null;
    function loadLeaflet() {
      if (window.L?.map) return Promise.resolve(window.L);
      if (leafletPromise) return leafletPromise;
      leafletPromise = new Promise((resolve, reject) => {
        if (!document.querySelector('link[data-leaflet]')) {
          const css = document.createElement("link");
          css.rel = "stylesheet";
          css.href = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.css";
          css.dataset.leaflet = "true";
          document.head.append(css);
        }
        const script = document.createElement("script");
        script.src = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
        script.async = true;
        script.onload = () => window.L?.map ? resolve(window.L) : reject(new Error("備援地圖程式庫載入失敗。"));
        script.onerror = () => reject(new Error("備援地圖程式庫無法下載。"));
        document.head.append(script);
      });
      return leafletPromise;
    }

    const PLUS_ALPHABET = "23456789CFGHJMPQRVWX";
    const PAIR_RESOLUTIONS = [20, 1, 0.05, 0.0025, 0.000125];

    function parseCoordinateText(raw) {
      const cleaned = String(raw || "")
        .trim()
        .replace(/[()（）]/g, "")
        .replace(/[，、；;]/g, ",");
      const match = cleaned.match(/^\s*([+-]?\d+(?:\.\d+)?)\s*[, ]\s*([+-]?\d+(?:\.\d+)?)\s*$/);
      if (!match) return null;
      const latitude = Number(match[1]);
      const longitude = Number(match[2]);
      if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) return null;
      if (latitude < -90 || latitude > 90 || longitude < -180 || longitude > 180) return null;
      return { latitude, longitude };
    }

    function extractPlusCode(raw) {
      const candidate = String(raw || "").trim().toUpperCase().split(/[\s,，]/)[0];
      return candidate.replace(/[^23456789CFGHJMPQRVWX+0]/g, "");
    }

    function decodeFullPlusCode(raw) {
      const code = extractPlusCode(raw);
      if (!/^[23456789CFGHJMPQRVWX]{8}\+[23456789CFGHJMPQRVWX]{2,7}$/.test(code)) return null;
      const clean = code.replace("+", "").replace(/0/g, "");
      let latitudeLo = -90;
      let longitudeLo = -180;
      let latitudeResolution = 20;
      let longitudeResolution = 20;
      const pairLength = Math.min(clean.length, 10);
      for (let i = 0; i < pairLength; i += 2) {
        const latitudeIndex = PLUS_ALPHABET.indexOf(clean[i]);
        const longitudeIndex = PLUS_ALPHABET.indexOf(clean[i + 1]);
        if (latitudeIndex < 0 || longitudeIndex < 0) return null;
        const resolution = PAIR_RESOLUTIONS[i / 2];
        latitudeLo += latitudeIndex * resolution;
        longitudeLo += longitudeIndex * resolution;
        latitudeResolution = resolution;
        longitudeResolution = resolution;
      }
      for (let i = 10; i < clean.length; i += 1) {
        const index = PLUS_ALPHABET.indexOf(clean[i]);
        if (index < 0) return null;
        latitudeResolution /= 5;
        longitudeResolution /= 4;
        latitudeLo += Math.floor(index / 4) * latitudeResolution;
        longitudeLo += (index % 4) * longitudeResolution;
      }
      return {
        latitude: Number((latitudeLo + latitudeResolution / 2).toFixed(7)),
        longitude: Number((longitudeLo + longitudeResolution / 2).toFixed(7))
      };
    }

    async function resolveCoordinateOrPlusCode(raw) {
      const coordinates = parseCoordinateText(raw);
      if (coordinates) return coordinates;

      const fullPlusCode = decodeFullPlusCode(raw);
      if (fullPlusCode) return fullPlusCode;

      if (String(raw || "").includes("+")) {
        try {
          await loadGoogleMaps();
          const geocoder = new google.maps.Geocoder();
          const response = await geocoder.geocode({ address: String(raw).trim(), region: "TW" });
          const location = response.results?.[0]?.geometry?.location;
          if (location) return { latitude: location.lat(), longitude: location.lng() };
        } catch (error) {
          console.warn("Plus Code geocoding failed:", error);
        }
        throw new Error("這個 Plus Code 無法直接解析。請貼上完整 Plus Code，或改貼「緯度, 經度」。");
      }

      throw new Error("請貼上「緯度, 經度」，例如 (24.3523330, 121.7377273)，或貼上完整 Plus Code。");
    }

    function formatCoordinate(latitude, longitude) {
      if (latitude == null || longitude == null || String(latitude).trim() === "" || String(longitude).trim() === "") return "";
      const lat = Number(latitude);
      const lng = Number(longitude);
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return "";
      return `(${lat.toFixed(7)}, ${lng.toFixed(7)})`;
    }

    async function initGooglePlaceSearch({ input, suggestionsNode, statusNode, onSelect }) {
      let timer = null;
      let requestSerial = 0;
      let sessionToken = null;
      let AutocompleteSuggestion = null;
      let AutocompleteSessionToken = null;

      const closeSuggestions = () => {
        suggestionsNode.classList.remove("show");
        suggestionsNode.innerHTML = "";
      };

      try {
        await loadGoogleMaps();
        ({ AutocompleteSuggestion, AutocompleteSessionToken } = await google.maps.importLibrary("places"));
        sessionToken = new AutocompleteSessionToken();
        statusNode.textContent = "";
      } catch (error) {
        console.warn("Google Place search unavailable:", error);
        statusNode.textContent = "Google 地點搜尋目前無法使用，仍可手動輸入地址與座標。";
        return () => {};
      }

      const search = async () => {
        const keyword = input.value.trim();
        if (keyword.length < 2) {
          closeSuggestions();
          statusNode.textContent = "";
          return;
        }

        const serial = ++requestSerial;
        statusNode.textContent = "正在搜尋地點…";
        try {
          const { suggestions = [] } = await AutocompleteSuggestion.fetchAutocompleteSuggestions({
            input: keyword,
            sessionToken,
            language: "zh-TW",
            region: "tw"
          });
          if (serial !== requestSerial) return;

          const predictions = suggestions
            .map((item) => item.placePrediction)
            .filter(Boolean)
            .slice(0, 6);

          if (!predictions.length) {
            closeSuggestions();
            statusNode.textContent = "找不到符合的 Google 地點，仍可手動輸入。";
            return;
          }

          suggestionsNode.innerHTML = `${predictions.map((prediction, index) => {
            const text = prediction.text?.toString?.() || "未命名地點";
            const secondary = prediction.secondaryText?.toString?.() || "";
            return `<button type="button" class="place-suggestion" data-place-index="${index}" role="option">
              ${icon("location")}
              <span><strong>${escapeHtml(text)}</strong>${secondary ? `<small>${escapeHtml(secondary)}</small>` : ""}</span>
            </button>`;
          }).join("")}<div class="google-attribution">由 Google 提供</div>`;
          suggestionsNode.classList.add("show");
          statusNode.textContent = "請從清單選擇正確地點。";

          suggestionsNode.querySelectorAll("[data-place-index]").forEach((button) => {
            button.addEventListener("click", async () => {
              const prediction = predictions[Number(button.dataset.placeIndex)];
              if (!prediction) return;
              statusNode.textContent = "正在帶入地點資料…";
              try {
                const place = prediction.toPlace();
                await place.fetchFields({
                  fields: ["displayName", "formattedAddress", "location", "plusCode"]
                });
                const location = place.location;
                const plusCode = place.plusCode?.globalCode || place.plusCode?.compoundCode || "";
                await onSelect({
                  placeName: place.displayName || prediction.text?.toString?.() || keyword,
                  address: place.formattedAddress || "",
                  latitude: location ? Number(location.lat()) : null,
                  longitude: location ? Number(location.lng()) : null,
                  plusCode,
                  placeId: place.id || ""
                });
                sessionToken = new AutocompleteSessionToken();
                closeSuggestions();
                statusNode.textContent = "已帶入 Google 地點資料，仍可手動修改。";
              } catch (error) {
                console.error(error);
                statusNode.textContent = "無法取得這個地點的詳細資料，請改用手動輸入。";
              }
            });
          });
        } catch (error) {
          console.error(error);
          closeSuggestions();
          statusNode.textContent = "Google 地點搜尋失敗，請稍後重試或手動輸入。";
        }
      };

      const onInput = () => {
        clearTimeout(timer);
        timer = setTimeout(search, 420);
      };
      const onDocumentPointer = (event) => {
        if (!event.target.closest(".place-autocomplete-wrap")) closeSuggestions();
      };

      input.addEventListener("input", onInput);
      document.addEventListener("pointerdown", onDocumentPointer);

      return () => {
        clearTimeout(timer);
        requestSerial += 1;
        input.removeEventListener("input", onInput);
        document.removeEventListener("pointerdown", onDocumentPointer);
      };
    }
