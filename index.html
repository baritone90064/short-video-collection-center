      const metadataPreview = document.querySelector("#metadata-preview");
      const placeNameInput = document.querySelector("#place-name");
      const addressInput = document.querySelector("#place-address");
      const coordinateInput = document.querySelector("#place-coordinate");
      const placeSuggestions = document.querySelector("#place-suggestions");
      const placeSearchStatus = document.querySelector("#place-search-status");

      let noteManuallyEdited = Boolean(existing?.note);
      let metadataTitleState = "";
      let thumbnailUrlState = String(existing?.thumbnailUrl || inferThumbnailUrl(existing?.url || "", existing?.platform || "other") || "").trim();
      let metadataRequestSerial = 0;

      const renderMetadataPreview = () => {
        const platform = platformSelect.value || detectPlatform(urlInput.value);
        const thumbnailUrl = thumbnailUrlState;
        const fetchedTitle = metadataTitleState.trim();
        if (!thumbnailUrl && !fetchedTitle) {
          metadataPreview.classList.add("hidden");
          metadataPreview.innerHTML = "";
          return;
        }
        metadataPreview.classList.remove("hidden");
        metadataPreview.innerHTML = `<div class="metadata-preview-thumb">${thumbnailUrl
          ? `<img src="${escapeHtml(thumbnailUrl)}" alt="" data-metadata-preview-image />`
          : fallbackThumb(platform)}</div>
          <div class="metadata-preview-copy"><strong>${escapeHtml(fetchedTitle || "尚未取得公開資訊")}</strong><small>${escapeHtml(platformMeta(platform).label)}・公開標題會放入備註，收藏標題請自行輸入</small></div>`;
        metadataPreview.querySelector("[data-metadata-preview-image]")?.addEventListener("error", (event) => {
          event.currentTarget.parentElement.innerHTML = fallbackThumb(platform);
        }, { once: true });
        metadataPreview.querySelector("[data-platform-logo]")?.addEventListener("error", (event) => { event.currentTarget.parentElement?.classList.add("logo-failed"); event.currentTarget.remove(); }, { once: true });
      };

      const applyVideoMetadata = async ({ force = false } = {}) => {
        const url = urlInput.value.trim();
        if (!url) {
          metadataStatus.textContent = "未填連結時，可直接選擇 Google Maps 平台並新增地點收藏。";
          return;
        }
        const requestId = ++metadataRequestSerial;
        metadataTitleState = "";
        const platform = detectPlatform(url);
        if (!existing || String(existing.url || "").trim() !== url) thumbnailUrlState = inferThumbnailUrl(url, platform) || "";
        platformSelect.value = platform;
        metadataStatus.textContent = "正在讀取公開標題與縮圖…";
        document.querySelector("#fetch-metadata").disabled = true;
        try {
          const metadata = await fetchVideoMetadata(url);
          if (requestId !== metadataRequestSerial) return;
          metadataTitleState = String(metadata.title || "").trim();
          if (metadataTitleState && (!noteManuallyEdited || !noteInput.value.trim())) {
            noteInput.value = metadataTitleState;
            noteManuallyEdited = false;
          }
          if (metadata.thumbnailUrl) thumbnailUrlState = metadata.thumbnailUrl;
          metadataStatus.textContent = metadata.warning
            ? `${metadata.warning} 已保留手動修改。`
            : `已從 ${metadata.source || platformMeta(platform).label} 帶入可取得的資料。`;
          renderMetadataPreview();
        } catch (error) {
          if (requestId !== metadataRequestSerial) return;
          const fallback = inferThumbnailUrl(url, platform);
          if (fallback) thumbnailUrlState = fallback;
          metadataStatus.textContent = `${error?.message || "無法自動讀取。"} 請自行輸入收藏標題；縮圖會改用平台 Logo。`;
          renderMetadataPreview();
        } finally {
          document.querySelector("#fetch-metadata").disabled = false;
        }
      };

      noteInput.addEventListener("input", () => {
        noteManuallyEdited = true;
      });
      platformSelect.addEventListener("change", renderMetadataPreview);
      placeNameInput.addEventListener("input", () => {
        placeState.placeName = placeNameInput.value.trim();
      });
      addressInput.addEventListener("input", () => { placeState.address = addressInput.value.trim(); });

      urlInput.addEventListener("blur", () => {
        if (!urlInput.value.trim()) return;
        platformSelect.value = detectPlatform(urlInput.value);
        applyVideoMetadata();
      });
      urlInput.addEventListener("paste", () => {
        setTimeout(() => {
          if (!urlInput.value.trim()) return;
          platformSelect.value = detectPlatform(urlInput.value);
          applyVideoMetadata();
        }, 80);
      });
      document.querySelector("#fetch-metadata").addEventListener("click", () => applyVideoMetadata({ force: true }));
      renderMetadataPreview();
      document.querySelector("#cancel-form").addEventListener("click", () => go("home"));

      const cleanupPlaceSearch = await initGooglePlaceSearch({
        input: placeNameInput,
        suggestionsNode: placeSuggestions,
        statusNode: placeSearchStatus,
        onSelect: async (place) => {
          placeNameInput.value = place.placeName || placeNameInput.value;
          addressInput.value = place.address || "";
          placeState.placeName = placeNameInput.value.trim();
          placeState.address = addressInput.value.trim();
          placeState.placeId = place.placeId || "";
          placeState.plusCode = place.plusCode || "";

          if (Number.isFinite(place.latitude) && Number.isFinite(place.longitude)) {
            placeState.latitude = place.latitude;
            placeState.longitude = place.longitude;
            coordinateInput.value = formatCoordinate(place.latitude, place.longitude);
          } else if (place.plusCode) {
            placeState.latitude = null;
            placeState.longitude = null;
            coordinateInput.value = place.plusCode;
          }
          showToast("已帶入 Google 地點資料。", "success");
        }
      });
      state.cleanup.push(cleanupPlaceSearch);

      const applyCoordinateInput = async ({ silent = false } = {}) => {
        const raw = coordinateInput.value.trim();
        if (!raw) {
          placeState.latitude = null;
          placeState.longitude = null;
          return false;
        }
        try {
          const position = await resolveCoordinateOrPlusCode(raw);
          placeState.latitude = Number(position.latitude);
          placeState.longitude = Number(position.longitude);
          placeState.plusCode = raw.includes("+") ? raw.toUpperCase() : "";
          coordinateInput.value = formatCoordinate(placeState.latitude, placeState.longitude);
          if (!silent) showToast("位置已解析。", "success");
          return true;
        } catch (error) {
          if (!silent) showToast(error?.message || "無法解析位置。", "error");
          throw error;
        }
      };

      document.querySelector("#parse-coordinate").addEventListener("click", async (event) => {
        try {
          event.currentTarget.disabled = true;
          await applyCoordinateInput();
        } catch {}
        finally { event.currentTarget.disabled = false; }
      });

      coordinateInput.addEventListener("change", async () => {
        if (!coordinateInput.value.trim()) return;
        try { await applyCoordinateInput({ silent: true }); }
        catch {}
      });

      document.querySelector("#use-current-place").addEventListener("click", async (event) => {
        try {
          event.currentTarget.disabled = true;
          const position = await getCurrentPosition();
          placeState.latitude = position.latitude;
          placeState.longitude = position.longitude;
          coordinateInput.value = formatCoordinate(position.latitude, position.longitude);
          showToast("已填入目前位置。", "success");
        } catch (error) {
          showToast(error?.message || "無法取得位置。", "error");
        } finally {
          event.currentTarget.disabled = false;
        }
      });

      document.querySelector("#clear-place").addEventListener("click", () => {
        Object.assign(placeState, { placeName: "", address: "", latitude: null, longitude: null, placeId: "", plusCode: "" });
        placeNameInput.value = "";
        addressInput.value = "";
        coordinateInput.value = "";
        showToast("地點已清除。", "success");
      });

      document.querySelector("#bookmark-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const button = document.querySelector("#save-bookmark");
        try {
          button.disabled = true;

          placeState.placeName = placeNameInput.value.trim();
          placeState.address = addressInput.value.trim();
          if (coordinateInput.value.trim()) await applyCoordinateInput({ silent: true });
          else {
            placeState.latitude = null;
            placeState.longitude = null;
          }

          const url = urlInput.value.trim();
          const normalizedUrl = normalizeUrl(url);
          const duplicate = await findDuplicate(normalizedUrl);
          if (duplicate && duplicate.id !== existing?.id) throw new Error(`這個連結已收藏：${duplicate.title || "未命名收藏"}`);

          const hasCoordinates = Number.isFinite(Number(placeState.latitude)) && Number.isFinite(Number(placeState.longitude));
          const rawCoordinate = coordinateInput.value.trim();
          const hasAnyLocation = Boolean(placeState.placeName || placeState.address || rawCoordinate || placeState.placeId || placeState.plusCode);

          const platform = platformSelect.value;
          const input = {
            url,
            normalizedUrl,
            platform,
            title: titleInput.value.trim(),
            categoryId: document.querySelector("#bookmark-category").value,
            wishlist: document.querySelector("#bookmark-wishlist").checked,
            tags: parseTags(document.querySelector("#bookmark-tags").value),
            note: document.querySelector("#bookmark-note").value.trim(),
            thumbnailUrl: thumbnailUrlState || inferThumbnailUrl(url, platform) || (existing?.url === url ? existing?.thumbnailUrl || "" : ""),
            hasLocation: hasCoordinates,
            location: hasAnyLocation ? {
              placeName: placeState.placeName || "",
              address: placeState.address || "",
              latitude: hasCoordinates ? Number(placeState.latitude) : null,
              longitude: hasCoordinates ? Number(placeState.longitude) : null,
              geohash: hasCoordinates ? geohashForLocation([Number(placeState.latitude), Number(placeState.longitude)]) : "",
              placeId: placeState.placeId || "",
              plusCode: placeState.plusCode || (!hasCoordinates && rawCoordinate.includes("+") ? rawCoordinate.toUpperCase() : "")
            } : null
          };

          if (existing) {
            await updateBookmark(existing.id, input);
            Object.assign(existing, input, { updatedAt: new Date() });
            showToast("收藏已更新。", "success");
          } else {
            const newId = await createBookmark(input);
            state.bookmarks.unshift({ id: newId, ...input, createdAt: new Date(), updatedAt: new Date() });
            showToast("收藏已新增。", "success");
          }
          go("home");
        } catch (error) {
          document.querySelector("#form-message").innerHTML = `<div class="alert alert-error">${escapeHtml(error?.message || "儲存失敗。")}</div>`;
          button.disabled = false;
        }
      });
    }

    async function renderMap(focusId = "") {
      cleanups();
      await loadCoreData();
      document.body.classList.add("map-view");
      state.cleanup.push(() => document.body.classList.remove("map-view"));

      shell({
        title: "收藏地圖",
        subtitle: "移動或縮放地圖後搜尋目前區域",
        active: "map",
        content: `<div class="map-workspace">
          <div class="map-toolbar">
            <button class="btn btn-secondary" id="search-area">${icon("search")}<span>搜尋此區域</span></button>
            <select id="map-category" aria-label="分類"><option value="">全部分類</option>${state.categories.map((category) => `<option value="${escapeHtml(category.id)}">${escapeHtml(category.name)}</option>`).join("")}</select>
            <button class="btn btn-secondary map-wishlist" id="map-wishlist" aria-label="只看願望清單" aria-pressed="false" title="只看願望清單">${icon("star")}</button>
            <button class="btn btn-soft" id="current-location" aria-label="目前位置" title="目前位置">${icon("compass")}<span class="map-location-label">目前位置</span></button>
          </div>
          <div class="map-shell"><div id="map-status" class="map-status"></div><div id="main-map" class="map-canvas"></div></div>
          <p id="map-provider-note" class="map-provider-note map-provider-overlay"></p>
          <section id="map-sheet" class="map-sheet collapsed" aria-label="收藏清單">
            <button type="button" id="map-sheet-handle" class="map-sheet-handle" aria-label="拖曳調整收藏清單高度">
              <span class="map-sheet-grabber"></span>
              <span class="map-sheet-summary"><strong id="map-sheet-title">收藏清單</strong><small id="map-sheet-count">0 筆</small></span>
            </button>
            <div id="map-results" class="map-results" aria-live="polite"></div>
          </section>
        </div>`
      });

      const workspace = document.querySelector(".map-workspace");
      const status = document.querySelector("#map-status");
      const resultsNode = document.querySelector("#map-results");
      const providerNote = document.querySelector("#map-provider-note");
      const sheet = document.querySelector("#map-sheet");
      const sheetHandle = document.querySelector("#map-sheet-handle");
      const sheetTitle = document.querySelector("#map-sheet-title");
      const sheetCount = document.querySelector("#map-sheet-count");
      const categorySelect = document.querySelector("#map-category");
      const selected = {
        categoryId: "",
        wishlistOnly: false,
        center: { ...CONFIG.defaultCenter },
        records: [],
        selectedBookmarkId: focusId || ""
      };
      let controller = null;
      let sheetHeight = 30;
      let lastExpandedHeight = 180;

      const showStatus = (message = "") => {
        status.textContent = message;
        status.classList.toggle("show", Boolean(message));
      };

      const sheetLimits = () => {
        const workspaceHeight = Math.max(220, workspace?.clientHeight || window.innerHeight * .7);
        return { min: 30, max: Math.max(150, workspaceHeight - 62) };
      };

      const setSheetHeight = (height, { animate = true } = {}) => {
        const { min, max } = sheetLimits();
        const next = Math.max(min, Math.min(max, Number(height) || min));
        sheet.style.transition = animate ? "height .23s ease" : "none";
        sheet.style.height = `${next}px`;
        sheetHeight = next;
        const collapsed = next <= min + 4;
        sheet.classList.toggle("collapsed", collapsed);
        if (!collapsed) lastExpandedHeight = next;
      };

      const suggestedSheetHeight = (count, { single = false } = {}) => {
        const { min, max } = sheetLimits();
        if (!count) return Math.min(max, 112);
        const visibleRows = single ? 1 : Math.min(count, 4);
        return Math.max(min, Math.min(max, 52 + 12 + visibleRows * 72 + Math.max(0, visibleRows - 1) * 8));
      };

      const openSheetForRecords = (count, { single = false } = {}) => {
        setSheetHeight(suggestedSheetHeight(count, { single }));
      };

      const collapseSheet = () => setSheetHeight(sheetLimits().min);

      let dragState = null;
      const finishSheetDrag = (event) => {
        if (!dragState) return;
        try { sheetHandle.releasePointerCapture(event.pointerId); } catch {}
        const moved = dragState.moved;
        dragState = null;
        sheet.classList.remove("dragging");
        const { min, max } = sheetLimits();
        if (!moved) {
          if (sheetHeight <= min + 4) setSheetHeight(lastExpandedHeight || suggestedSheetHeight(filteredRecords().length));
          else collapseSheet();
          return;
        }
        if (sheetHeight < min + 30) collapseSheet();
        else if (sheetHeight > max - 24) setSheetHeight(max);
        else setSheetHeight(sheetHeight);
      };

      sheetHandle.addEventListener("pointerdown", (event) => {
        if (event.pointerType === "mouse" && event.button !== 0) return;
        dragState = { startY: event.clientY, startHeight: sheet.getBoundingClientRect().height, moved: false };
        sheetHandle.setPointerCapture(event.pointerId);
        sheet.classList.add("dragging");
      });
      sheetHandle.addEventListener("pointermove", (event) => {
        if (!dragState) return;
        const delta = dragState.startY - event.clientY;
        if (Math.abs(delta) > 3) dragState.moved = true;
        setSheetHeight(dragState.startHeight + delta, { animate: false });
      });
      sheetHandle.addEventListener("pointerup", finishSheetDrag);
      sheetHandle.addEventListener("pointercancel", finishSheetDrag);
      sheetHandle.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        event.preventDefault();
        const { min } = sheetLimits();
        if (sheetHeight <= min + 4) setSheetHeight(lastExpandedHeight || suggestedSheetHeight(filteredRecords().length));
        else collapseSheet();
      });
      const handleMapResize = () => setSheetHeight(sheetHeight, { animate: false });
      window.addEventListener("resize", handleMapResize);
      state.cleanup.push(() => window.removeEventListener("resize", handleMapResize));

      const createGoogleController = async (node, start, currentPosition = null) => {
        await loadGoogleMaps();
        const map = new google.maps.Map(node, {
          center: { lat: start.latitude, lng: start.longitude },
          zoom: 12,
          mapId: CONFIG.googleMapsMapId || undefined,
          mapTypeControl: false,
          streetViewControl: false,
          fullscreenControl: false,
          gestureHandling: "greedy"
        });
        let currentMarker = null;
        const setCurrentPosition = (position) => {
          if (!currentMarker) {
            currentMarker = new google.maps.Marker({
              map,
              title: "目前位置",
              zIndex: 999,
              icon: {
                path: google.maps.SymbolPath.CIRCLE,
                scale: 9,
                fillColor: "#2f80ed",
                fillOpacity: 1,
                strokeColor: "#ffffff",
                strokeWeight: 4
              }
            });
          }
          currentMarker.setPosition({ lat: position.latitude, lng: position.longitude });
        };
        if (currentPosition) setCurrentPosition(currentPosition);
        const bookmarkMarkers = [];
        return {
          provider: "google",
          getCenter() {
            const center = map.getCenter();
            return { latitude: center.lat(), longitude: center.lng() };
          },
          contains(position) {
            const bounds = map.getBounds();
            return Boolean(bounds?.contains({ lat: Number(position.latitude), lng: Number(position.longitude) }));
          },
          panTo(position) { map.panTo({ lat: position.latitude, lng: position.longitude }); },
          setZoom(zoom) { map.setZoom(zoom); },
          setCurrentPosition,
          waitForIdle() {
            return new Promise((resolve) => {
              let finished = false;
              const finish = () => { if (!finished) { finished = true; resolve(); } };
              google.maps.event.addListenerOnce(map, "idle", finish);
              setTimeout(finish, 700);
            });
          },
          clearBookmarks() { bookmarkMarkers.splice(0).forEach((marker) => marker.setMap(null)); },
          addBookmark(bookmark, color, onClick) {
            const marker = new google.maps.Marker({
              map,
              position: { lat: Number(bookmark.location.latitude), lng: Number(bookmark.location.longitude) },
              title: bookmark.title,
              icon: {
                url: markerPinDataUrl(color),
                scaledSize: new google.maps.Size(32, 42),
                anchor: new google.maps.Point(16, 40)
              }
            });
            marker.addListener("click", onClick);
            bookmarkMarkers.push(marker);
          },
          destroy() {}
        };
      };

      const createLeafletController = async (node, start, currentPosition = null) => {
        await loadLeaflet();
        const map = L.map(node, { zoomControl: true, attributionControl: true }).setView([start.latitude, start.longitude], 12);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
          attribution: "&copy; OpenStreetMap contributors"
        }).addTo(map);
        let currentMarker = null;
        const setCurrentPosition = (position) => {
          if (!currentMarker) {
            currentMarker = L.circleMarker([position.latitude, position.longitude], {
              radius: 9,
              color: "#ffffff",
              weight: 4,
              fillColor: "#2f80ed",
              fillOpacity: 1
            }).addTo(map);
          } else currentMarker.setLatLng([position.latitude, position.longitude]);
        };
        if (currentPosition) setCurrentPosition(currentPosition);
        const bookmarkMarkers = [];
        setTimeout(() => map.invalidateSize(), 80);
        return {
          provider: "leaflet",
          getCenter() {
            const center = map.getCenter();
            return { latitude: center.lat, longitude: center.lng };
          },
          contains(position) { return map.getBounds().contains([Number(position.latitude), Number(position.longitude)]); },
          panTo(position) { map.panTo([position.latitude, position.longitude]); },
          setZoom(zoom) { map.setZoom(zoom); },
          setCurrentPosition,
          waitForIdle() { return new Promise((resolve) => { map.invalidateSize(); setTimeout(resolve, 320); }); },
          clearBookmarks() { bookmarkMarkers.splice(0).forEach((marker) => map.removeLayer(marker)); },
          addBookmark(bookmark, color, onClick) {
            const marker = L.marker(
              [Number(bookmark.location.latitude), Number(bookmark.location.longitude)],
              { icon: L.icon({ iconUrl: markerPinDataUrl(color), iconSize: [32, 42], iconAnchor: [16, 40], className: "map-marker-pin" }) }
            ).addTo(map);
            marker.on("click", onClick);
            bookmarkMarkers.push(marker);
          },
          destroy() { map.remove(); }
        };
      };

      const filteredRecords = () => selected.records.filter((item) =>
        (!selected.categoryId || item.categoryId === selected.categoryId) &&
        (!selected.wishlistOnly || item.wishlist === true)
      );

      const renderResults = ({ scrollToSelected = false, autoOpen = false, single = false } = {}) => {
        const categories = categoryMap();
        const records = filteredRecords();
        sheetTitle.textContent = selected.selectedBookmarkId ? "已選取收藏" : "收藏清單";
        sheetCount.textContent = `${records.length} 筆`;
        resultsNode.innerHTML = `<div class="map-results-list">${records.length ? records.map((bookmark) => {
          const category = categories.get(bookmark.categoryId) || { color: "#9a96a1", icon: "other" };
          const navigationUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(`${bookmark.location.latitude},${bookmark.location.longitude}`)}`;
          return `<article id="map-result-${escapeHtml(bookmark.id)}" class="map-result-row ${bookmark.id === selected.selectedBookmarkId ? "selected" : ""}" style="--result-color:${escapeHtml(categoryColor(category))}" data-map-result="${escapeHtml(bookmark.id)}">
            <span class="map-result-icon">${icon(categoryIconName(category))}</span>
            <div class="map-result-copy"><strong>${escapeHtml(bookmark.title || "未命名收藏")}</strong><small>${escapeHtml(bookmark.location?.placeName || "自訂地點")}${bookmark.distanceKm != null ? `・${bookmark.distanceKm.toFixed(bookmark.distanceKm < 10 ? 1 : 0)} km` : ""}</small></div>
            <div class="map-result-actions"><a class="btn btn-icon btn-soft" href="${escapeHtml(bookmark.url)}" target="_blank" rel="noreferrer" aria-label="開啟連結" title="開啟連結">${icon("play")}</a><a class="btn btn-icon btn-primary" href="${navigationUrl}" target="_blank" rel="noreferrer" aria-label="導航" title="導航">${icon("navigation")}</a></div>
          </article>`;
        }).join("") : `<div class="empty">${icon("map")}<p>目前地圖範圍內沒有符合篩選條件的收藏。</p></div>`}</div>`;

        resultsNode.querySelectorAll("[data-map-result]").forEach((row) => row.addEventListener("click", (event) => {
          if (event.target.closest("a,button")) return;
          const bookmark = records.find((item) => item.id === row.dataset.mapResult);
          if (!bookmark || !controller) return;
          selected.selectedBookmarkId = bookmark.id;
          controller.panTo({ latitude: Number(bookmark.location.latitude), longitude: Number(bookmark.location.longitude) });
          controller.setZoom(15);
          renderResults();
        }));

        if (autoOpen) openSheetForRecords(records.length, { single });
        if (scrollToSelected && selected.selectedBookmarkId) {
          requestAnimationFrame(() => {
            document.querySelector(`#map-result-${CSS.escape(selected.selectedBookmarkId)}`)?.scrollIntoView({ behavior: "smooth", block: "nearest" });
          });
        }
      };

      const renderMarkers = ({ scrollToSelected = false, autoOpen = false, single = false } = {}) => {
        if (!controller) return;
        controller.clearBookmarks();
        const categories = categoryMap();
        const records = filteredRecords();
        records.forEach((bookmark) => {
          const category = categories.get(bookmark.categoryId) || { color: "#9a96a1" };
          controller.addBookmark(bookmark, categoryColor(category), () => {
            selected.selectedBookmarkId = bookmark.id;
            renderResults({ scrollToSelected: true, autoOpen: true, single: true });
          });
        });
        renderResults({ scrollToSelected, autoOpen, single });
        if (!records.length) showStatus("這個地圖範圍內沒有符合篩選條件的收藏。");
        else showStatus("");
      };

      const withDistances = (records, center) => records.map((bookmark) => ({
        ...bookmark,
        distanceKm: distanceBetween(
          [center.latitude, center.longitude],
          [Number(bookmark.location.latitude), Number(bookmark.location.longitude)]
        )
      })).sort((a, b) => a.distanceKm - b.distanceKm);

      const searchVisibleArea = ({ autoOpen = true, preserveSelection = false, single = false, scrollToSelected = false } = {}) => {
        if (!controller) return;
        const center = controller.getCenter();
        selected.center = center;
        const records = state.bookmarks.filter((bookmark) =>
          bookmark.hasLocation &&
          bookmark.location?.latitude != null &&
          bookmark.location?.longitude != null &&
          controller.contains(bookmark.location)
        );
        selected.records = withDistances(records, center);
        if (!preserveSelection) selected.selectedBookmarkId = "";
        renderMarkers({ autoOpen, single, scrollToSelected });
      };

      try {
        showStatus("正在載入地圖…");
        let currentPosition = null;
        try { currentPosition = await getCurrentPosition(); } catch {}
        const focusBookmark = focusId
          ? state.bookmarks.find((item) => item.id === focusId && item.hasLocation && item.location?.latitude != null && item.location?.longitude != null)
          : null;
        const focusPosition = focusBookmark
          ? { latitude: Number(focusBookmark.location.latitude), longitude: Number(focusBookmark.location.longitude) }
          : null;
        const start = focusPosition || currentPosition || { ...CONFIG.defaultCenter };
        selected.center = start;
        const node = document.querySelector("#main-map");

        try {
          controller = await createGoogleController(node, start, currentPosition);
          providerNote.textContent = "地圖來源：Google Maps";
        } catch (googleError) {
          console.error("Google Maps failed:", googleError);
          node.innerHTML = "";
          controller = await createLeafletController(node, start, currentPosition);
          providerNote.textContent = `Google Maps 尚未通過驗證，已切換備援地圖。${googleError?.message ? ` ${googleError.message}` : ""}`;
        }

        state.cleanup.push(() => controller?.destroy?.());
        if (focusPosition) {
          controller.panTo(focusPosition);
          controller.setZoom(15);
          await controller.waitForIdle?.();
          searchVisibleArea({ autoOpen: true, preserveSelection: true, single: true, scrollToSelected: true });
        } else {
          await controller.waitForIdle?.();
          searchVisibleArea({ autoOpen: false });
          collapseSheet();
        }
      } catch (error) {
        console.error(error);
        showStatus(error?.message || "地圖載入失敗。");
      }

      document.querySelector("#search-area").addEventListener("click", () => searchVisibleArea({ autoOpen: true }));

      document.querySelector("#current-location").addEventListener("click", async () => {
        try {
          const position = await getCurrentPosition();
          controller?.panTo(position);
          controller?.setZoom(14);
          controller?.setCurrentPosition(position);
          selected.selectedBookmarkId = "";
          await controller?.waitForIdle?.();
          searchVisibleArea({ autoOpen: true });
        } catch (error) {
          showToast(error?.message || "無法取得位置。", "error");
        }
      });

      categorySelect.addEventListener("change", () => {
        selected.categoryId = categorySelect.value;
        selected.selectedBookmarkId = "";
        renderMarkers({ autoOpen: true });
      });

      document.querySelector("#map-wishlist").addEventListener("click", (event) => {
        selected.wishlistOnly = !selected.wishlistOnly;
        event.currentTarget.classList.toggle("active", selected.wishlistOnly);
        event.currentTarget.setAttribute("aria-pressed", String(selected.wishlistOnly));
        event.currentTarget.title = selected.wishlistOnly ? "目前只顯示願望清單" : "只看願望清單";
        selected.selectedBookmarkId = "";
        renderMarkers({ autoOpen: true });
      });
    }

    function openModal(content, onReady) {
      const backdrop = document.createElement("div");
      backdrop.className = "modal-backdrop";
      backdrop.innerHTML = `<section class="modal">${content}</section>`;
      document.body.append(backdrop);
      const close = () => backdrop.remove();
      backdrop.addEventListener("click", (event) => { if (event.target === backdrop) close(); });
      onReady?.(backdrop, close);
    }

    function openEditCategory(category) {
      openModal(`<h3>編輯分類</h3><div class="form-grid"><label class="field">分類名稱<input id="edit-category-name" maxlength="20" value="${escapeHtml(category.name)}" /></label>${iconPicker("edit-category-icon", categoryIconName(category))}<label class="field">顏色<input id="edit-category-color" class="color-input" type="color" value="${escapeHtml(categoryColor(category))}" /></label></div><div class="form-actions"><button class="btn btn-secondary" id="cancel-category">取消</button><button class="btn btn-primary" id="save-category">儲存</button></div>`, (root, close) => {
        bindIconPickers(root);
        root.querySelector("#cancel-category").addEventListener("click", close);
        root.querySelector("#save-category").addEventListener("click", async (event) => {
          const name = root.querySelector("#edit-category-name").value.trim();
          if (!name) return showToast("分類名稱不可空白。", "error");
          try {
            event.currentTarget.disabled = true;
            const patch = { name, icon: root.querySelector("#edit-category-icon").value, color: root.querySelector("#edit-category-color").value };
            await updateCategory(category.id, patch);
            Object.assign(category, patch);
            close();
            showToast("分類已更新。", "success");
            renderSettings();
          } catch (error) { showToast(error?.message || "更新失敗。", "error"); event.currentTarget.disabled = false; }
        });
      });
    }

    async function renderSettings() {
      cleanups();
      await loadCoreData();
      const counts = new Map();
      state.bookmarks.forEach((bookmark) => counts.set(bookmark.categoryId, (counts.get(bookmark.categoryId) || 0) + 1));
      shell({
        title: "分類管理",
        subtitle: "共同管理收藏分類",
        active: "settings",
        content: `<section class="card panel"><div class="section-head"><div class="section-title"><span class="section-icon">${icon("settings")}</span><h2>分類管理</h2></div><span class="small muted">${state.categories.length} 個分類</span></div>
          <form id="add-category-form" class="category-add"><label class="field">新增分類<input id="new-category-name" maxlength="20" placeholder="分類名稱" required /></label><label class="field">顏色<input id="new-category-color" class="color-input" type="color" value="#ff8066" aria-label="分類顏色" /></label><button class="btn btn-primary" type="submit">${icon("plus")}新增</button>${iconPicker("new-category-icon", "sparkles")}</form>
          <div id="category-sort-list" class="category-list">${state.categories.map((category) => `<div class="category-row" data-category-id="${category.id}">
            <span class="category-order"><button type="button" class="drag-handle" data-drag-category aria-label="拖曳調整順序" title="拖曳調整順序">${icon("drag")}</button></span>
            <span class="category-icon" style="--category-color:${escapeHtml(categoryColor(category))}">${icon(categoryIconName(category))}</span>
            <div class="category-name"><strong>${escapeHtml(category.name)}</strong><small>${counts.get(category.id) || 0} 筆收藏</small></div>
            <button class="btn btn-small btn-icon btn-secondary" data-edit-category="${category.id}" aria-label="編輯">${icon("edit")}</button>
            <button class="btn btn-small btn-icon btn-danger" data-delete-category="${category.id}" ${category.system ? "disabled" : ""} aria-label="刪除">${icon("trash")}</button>
          </div>`).join("")}</div>
          <div class="category-sort-actions"><button type="button" class="btn btn-secondary" id="reset-category-order" disabled>還原排序</button><button type="button" class="btn btn-primary" id="save-category-order" disabled>${icon("check")}儲存排序</button></div>
        </section><div class="logout-wrap"><button id="logout" class="btn btn-secondary">${icon("logout")}登出</button></div>`
      });

      bindIconPickers(document);
      document.querySelector("#logout").addEventListener("click", () => signOut(auth));
      document.querySelector("#add-category-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const name = document.querySelector("#new-category-name").value.trim();
        if (!name) return;
        try {
          const selectedIcon = document.querySelector("#new-category-icon").value || "sparkles";
          const selectedColor = document.querySelector("#new-category-color").value;
          const id = await addCategory({ name, icon: selectedIcon, color: selectedColor });
          state.categories.push({ id, name, icon: selectedIcon, color: selectedColor, sortOrder: state.categories.length, system: false });
          showToast("分類已新增。", "success");
          renderSettings();
        } catch (error) { showToast(error?.message || "新增分類失敗。", "error"); }
      });
      const categorySortList = document.querySelector("#category-sort-list");
      const saveOrderButton = document.querySelector("#save-category-order");
      const resetOrderButton = document.querySelector("#reset-category-order");
      const originalOrder = state.categories.map((category) => category.id);
      let draggedRow = null;
      let activePointerId = null;

      const currentOrder = () => [...categorySortList.querySelectorAll("[data-category-id]")].map((row) => row.dataset.categoryId);
      const updateOrderButtons = () => {
        const changed = currentOrder().join("|") !== originalOrder.join("|");
        saveOrderButton.disabled = !changed;
        resetOrderButton.disabled = !changed;
      };
      const stopDragging = () => {
        if (!draggedRow) return;
        draggedRow.classList.remove("dragging");
        draggedRow = null;
        activePointerId = null;
        document.body.classList.remove("sorting-category");
        updateOrderButtons();
      };

      categorySortList.addEventListener("pointerdown", (event) => {
        const handle = event.target.closest("[data-drag-category]");
        if (!handle) return;
        event.preventDefault();
        draggedRow = handle.closest("[data-category-id]");
        activePointerId = event.pointerId;
        draggedRow.classList.add("dragging");
        document.body.classList.add("sorting-category");
        handle.setPointerCapture?.(event.pointerId);
      });
      categorySortList.addEventListener("pointermove", (event) => {
        if (!draggedRow || event.pointerId !== activePointerId) return;
        event.preventDefault();
        const rows = [...categorySortList.querySelectorAll("[data-category-id]:not(.dragging)")];
        const before = rows.find((row) => {
          const rect = row.getBoundingClientRect();
          return event.clientY < rect.top + rect.height / 2;
        });
        if (before) categorySortList.insertBefore(draggedRow, before);
        else categorySortList.appendChild(draggedRow);
      });
      categorySortList.addEventListener("pointerup", stopDragging);
      categorySortList.addEventListener("pointercancel", stopDragging);

      resetOrderButton.addEventListener("click", () => {
        originalOrder.forEach((id) => {
          const row = categorySortList.querySelector(`[data-category-id="${CSS.escape(id)}"]`);
          if (row) categorySortList.appendChild(row);
        });
        updateOrderButtons();
      });

      saveOrderButton.addEventListener("click", async () => {
        const ids = currentOrder();
        const previous = [...state.categories];
        try {
          saveOrderButton.disabled = true;
          resetOrderButton.disabled = true;
          state.categories = ids.map((id) => previous.find((category) => category.id === id)).filter(Boolean);
          await saveCategoryOrder();
          showToast("分類排序已儲存。", "success");
          renderSettings();
        } catch (error) {
          state.categories = previous;
          showToast(error?.message || "儲存排序失敗。", "error");
          updateOrderButtons();
        }
      });

      document.querySelectorAll("[data-edit-category]").forEach((button) => button.addEventListener("click", () => {
        const category = state.categories.find((item) => item.id === button.dataset.editCategory);
        if (category) openEditCategory(category);
      }));
      document.querySelectorAll("[data-delete-category]").forEach((button) => button.addEventListener("click", async () => {
        const category = state.categories.find((item) => item.id === button.dataset.deleteCategory);
        if (!category || !confirmDialog(`確定刪除分類「${category.name}」？`)) return;
        try {
          button.disabled = true;
          await deleteCategory(category.id);
          state.categories = state.categories.filter((item) => item.id !== category.id);
          showToast("分類已刪除。", "success");
          renderSettings();
        } catch (error) { showToast(error?.message || "刪除失敗。", "error"); button.disabled = false; }
      }));
    }

    async function renderRoute() {
      if (!state.user) return renderLogin();
      const current = route();
      try {
        if (current.path === "home") return renderHome();
        if (current.path === "add") return renderBookmarkForm();
        if (current.path === "edit") return renderBookmarkForm(current.id);
        if (current.path === "map") return renderMap(current.id);
        if (current.path === "settings") return renderSettings();
        go("home");
      } catch (error) {
        console.error(error);
        shell({ title: "發生錯誤", active: "home", content: `<div class="alert alert-error">${escapeHtml(error?.message || "載入失敗。")}</div>` });
      }
    }

    window.addEventListener("hashchange", renderRoute);
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        state.user = null;
        state.loaded = false;
        state.categories = [];
        state.bookmarks = [];
        renderLogin();
        return;
      }
      if (!isAllowedEmail(user.email)) {
        await signOut(auth);
        renderLogin("此帳號未被授權使用本 App。");
        return;
      }
      state.user = user;
      removeBottomNav();
      appRoot.innerHTML = `<div class="boot"><div class="boot-inner"><div class="brand-mark"><img src="./icon.svg?v=20260723-2" alt="" /></div><strong>正在同步收藏…</strong><div class="spinner"></div></div></div>`;
      try {
        await loadCoreData();
        if (!location.hash) location.hash = "#/home";
        else renderRoute();
      } catch (error) {
        console.error(error);
        renderLogin(error?.message || "無法讀取資料。");
      }
    });
  </script>
</body>
</html>
