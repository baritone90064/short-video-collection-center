<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ff8b6a" />
  <meta name="description" content="短影音收藏中心" />
  <title>短影音收藏中心</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Noto Sans TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg: #fff8f1;
      --surface: #ffffff;
      --surface-soft: #fffdf9;
      --coral: #ff8066;
      --coral-deep: #df5f4d;
      --coral-soft: #ffe5de;
      --orange: #ffad2f;
      --yellow: #ffd66b;
      --mint: #63c9a6;
      --mint-deep: #2f9a78;
      --mint-soft: #ddf6ec;
      --sky: #62afe9;
      --purple: #8a77df;
      --pink: #e96d9b;
      --text: #383641;
      --text-strong: #26242c;
      --muted: #7b7784;
      --line: #ece2d9;
      --danger: #c84646;
      --danger-soft: #ffe4e4;
      --shadow: 0 10px 30px rgba(92, 61, 43, .10);
      --shadow-float: 0 16px 36px rgba(255, 128, 102, .22);
      --radius: 18px;
      --radius-lg: 26px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }
    body { min-width: 320px; -webkit-font-smoothing: antialiased; }
    button, input, select, textarea { font: inherit; font-size: 16px; }
    html, body { touch-action: manipulation; overscroll-behavior-y: none; }
    button { cursor: pointer; }
    img { max-width: 100%; }
    a { color: inherit; }
    .hidden { display: none !important; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }

    body::before, body::after {
      content: "";
      position: fixed;
      z-index: -2;
      width: 230px;
      height: 230px;
      border-radius: 999px;
      filter: blur(4px);
      opacity: .52;
      pointer-events: none;
    }
    body::before { background: #ffe1d3; top: -90px; right: -90px; }
    body::after { background: #d8f4e7; left: -110px; bottom: 80px; }

    .boot, .login-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .boot-inner { display: grid; justify-items: center; gap: 12px; }
    .brand-mark {
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(145deg, var(--coral), var(--orange));
      box-shadow: var(--shadow-float);
      transform: rotate(-4deg);
    }
    .boot .brand-mark { width: 76px; height: 76px; border-radius: 25px; font-size: 30px; }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255,128,102,.2);
      border-top-color: var(--coral);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .login-card {
      width: min(430px, 100%);
      padding: 30px 24px;
      text-align: center;
      background: rgba(255,255,255,.95);
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow: var(--shadow);
    }
    .login-card .brand-mark { width: 82px; height: 82px; border-radius: 26px; margin: 0 auto 18px; font-size: 32px; }
    .login-card h1 { margin: 0; color: var(--text-strong); }
    .login-card p { line-height: 1.7; color: var(--muted); }
    .google-btn { width: 100%; margin-top: 12px; background: white; border-color: #d9d5d0; }

    .app-shell { min-height: 100vh; padding-bottom: calc(68px + env(safe-area-inset-bottom)); }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      min-height: 64px;
      padding: calc(9px + env(safe-area-inset-top)) 15px 9px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(255,248,241,.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(236,226,217,.92);
    }
    .top-title { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .top-title .brand-mark { width: 42px; height: 42px; border-radius: 14px; font-size: 16px; flex: 0 0 auto; }
    .top-copy { min-width: 0; }
    .top-copy strong { display: block; color: var(--text-strong); font-size: 18px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top-copy small { display: block; margin-top: 1px; font-size: 11px; color: var(--muted); }
    .page { width: min(1040px, 100%); margin: 0 auto; padding: 14px 14px 28px; }

    .bottom-nav {
      position: fixed !important;
      z-index: 180;
      left: 0;
      right: 0;
      bottom: 0 !important;
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3px;
      padding: 4px 8px calc(3px + env(safe-area-inset-bottom));
      border: 1px solid rgba(236,226,217,.95);
      border-bottom: 0;
      border-radius: 22px 22px 0 0;
      background: rgba(255,255,255,.985);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 -7px 24px rgba(91,59,43,.13);
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
      will-change: transform;
      isolation: isolate;
    }
    .nav-item {
      border: 0;
      background: transparent;
      color: var(--muted);
      min-height: 52px;
      border-radius: 18px;
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 2px;
      font-size: 11px;
      font-weight: 700;
    }
    .nav-item svg { width: 23px; height: 23px; }
    .nav-item.active { color: var(--coral-deep); background: var(--coral-soft); }
    .nav-item.add-nav { color: white; background: linear-gradient(145deg, var(--coral), var(--orange)); box-shadow: 0 8px 18px rgba(255,128,102,.28); }
    .nav-item:active { transform: scale(.97); }

    .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
    .panel { padding: 16px; }
    .hero {
      position: relative;
      overflow: hidden;
      padding: 18px;
      margin-bottom: 14px;
      border-radius: 24px;
      color: white;
      background: linear-gradient(125deg, var(--coral), var(--orange) 62%, var(--yellow));
      box-shadow: var(--shadow-float);
    }
    .hero::after { content: ""; position: absolute; width: 130px; height: 130px; border-radius: 50%; background: rgba(255,255,255,.20); right: -35px; top: -50px; }
    .hero h1 { position: relative; z-index: 1; margin: 0; font-size: 24px; }
    .hero p { position: relative; z-index: 1; margin: 7px 0 0; font-size: 14px; line-height: 1.6; }
    .hero-stats { position: relative; z-index: 1; display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .hero-stat { padding: 7px 10px; background: rgba(255,255,255,.2); border-radius: 999px; font-size: 12px; font-weight: 800; }

    .toolbar { display: flex; flex-wrap: wrap; gap: 9px; align-items: center; margin-bottom: 12px; }
    .search-wrap { position: relative; flex: 1 1 220px; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--muted); }
    .search-wrap input { padding-left: 39px; }
    input, select, textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid #e5d9cf;
      border-radius: 13px;
      background: #fffdfa;
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }
    textarea { min-height: 96px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: var(--coral); box-shadow: 0 0 0 4px rgba(255,128,102,.12); background: white; }
    label.field { display: grid; gap: 6px; color: var(--text-strong); font-weight: 800; font-size: 14px; }
    label.field small { color: var(--muted); font-weight: 400; line-height: 1.5; }
    .form-grid { display: grid; gap: 13px; }
    .form-grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .form-section { padding: 15px; border: 1px solid var(--line); border-radius: 18px; background: var(--surface-soft); }
    .section-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .section-title { display: flex; align-items: center; gap: 9px; }
    .section-title h2, .section-title h3 { margin: 0; color: var(--text-strong); }
    .section-icon { width: 38px; height: 38px; display: grid; place-items: center; border-radius: 13px; color: var(--coral-deep); background: var(--coral-soft); }
    .section-icon svg { width: 20px; height: 20px; }

    .btn {
      min-height: 42px;
      padding: 9px 13px;
      border: 1px solid transparent;
      border-radius: 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-weight: 800;
      text-decoration: none;
    }
    .btn svg { width: 17px; height: 17px; }
    .btn-primary { color: white; background: linear-gradient(135deg, var(--coral), var(--orange)); box-shadow: 0 8px 18px rgba(255,128,102,.22); }
    .btn-secondary { color: var(--text); background: white; border-color: var(--line); }
    .btn-soft { color: var(--mint-deep); background: var(--mint-soft); }
    .btn-danger { color: var(--danger); background: var(--danger-soft); }
    .btn-icon { width: 40px; min-width: 40px; padding: 0; }
    .btn-small { min-height: 34px; padding: 6px 10px; border-radius: 11px; font-size: 12px; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .form-actions { display: flex; justify-content: flex-end; gap: 9px; flex-wrap: wrap; margin-top: 15px; }

    .chips { display: flex; gap: 7px; overflow-x: auto; padding: 2px 0 8px; }
    .chip { flex: 0 0 auto; border: 1px solid var(--line); background: white; color: var(--muted); padding: 7px 11px; border-radius: 999px; font-size: 12px; font-weight: 800; }
    .chip.active { color: white; background: var(--chip-color, var(--coral)); border-color: transparent; }

    .bookmark-list { display: grid; gap: 10px; }
    .bookmark-row {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      gap: 11px;
      padding: 10px;
      overflow: hidden;
    }
    .bookmark-thumb {
      width: 88px;
      height: 88px;
      border-radius: 15px;
      overflow: hidden;
      background: #f2eee9;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }
    .bookmark-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .platform-fallback { width: 100%; height: 100%; display: grid; place-content: center; justify-items: center; gap: 5px; color: white; background: linear-gradient(145deg, var(--coral), var(--orange)); font-weight: 900; }
    .platform-fallback span:first-child { font-size: 22px; }
    .platform-fallback span:last-child { font-size: 10px; opacity: .9; }
    .bookmark-content { min-width: 0; display: grid; gap: 5px; align-content: start; }
    .bookmark-title { margin: 0; color: var(--text-strong); font-size: 15px; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .bookmark-meta { display: flex; flex-wrap: wrap; gap: 5px 8px; color: var(--muted); font-size: 11px; }
    .meta-item { display: inline-flex; align-items: center; gap: 4px; min-width: 0; }
    .meta-item svg { width: 13px; height: 13px; flex: 0 0 auto; }
    .category-pill { display: inline-flex; align-items: center; gap: 5px; color: var(--category-color); font-weight: 800; }
    .tag-line { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--muted); font-size: 11px; }
    .bookmark-actions { display: flex; gap: 6px; margin-top: 2px; }
    .bookmark-actions .btn { min-height: 32px; padding: 5px 9px; font-size: 11px; }
    .bookmark-actions .btn-icon { width: 32px; min-width: 32px; padding: 0; }

    .empty { padding: 34px 18px; text-align: center; color: var(--muted); }
    .empty svg { width: 46px; height: 46px; color: var(--mint); margin: 0 auto 10px; }

    .form-card { overflow: hidden; }
    .form-banner { padding: 17px; color: white; background: linear-gradient(120deg, var(--coral), var(--orange)); }
    .form-banner h2 { margin: 0; font-size: 20px; }
    .form-banner p { margin: 5px 0 0; font-size: 13px; opacity: .95; }
    .form-body { padding: 14px; }
    .place-tools { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .coordinate-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: end; }
    .coordinate-row .btn { min-width: 86px; }
    .map-provider-note { margin: 8px 2px 0; color: var(--muted); font-size: 12px; line-height: 1.55; }
    .place-picker { margin-top: 12px; border: 1px solid #cfe9de; border-radius: 18px; overflow: hidden; background: #edf7f2; }
    .place-search { padding: 10px; background: #f7fcf9; border-bottom: 1px solid #cfe9de; }
    .place-map { min-height: 310px; background: #edf4f0; }
    .coordinate-note { margin: 9px 0 0; color: var(--muted); font-size: 12px; line-height: 1.55; }

    .map-toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 10px; }
    .map-toolbar select { width: auto; min-width: 105px; }
    .map-shell { position: relative; overflow: hidden; border: 1px solid var(--line); border-radius: 20px; background: #eaf3ee; box-shadow: var(--shadow); }
    .map-canvas { min-height: min(62vh, 600px); z-index: 1; }
    .map-canvas .leaflet-control-container { font-size: 12px; }
    .map-status { position: absolute; z-index: 5; left: 12px; right: 12px; top: 12px; display: none; padding: 10px 12px; border-radius: 14px; background: rgba(255,255,255,.94); box-shadow: var(--shadow); font-size: 13px; }
    .map-status.show { display: block; }
    .map-sheet {
      position: fixed;
      z-index: 170;
      left: 12px;
      right: 12px;
      bottom: calc(64px + env(safe-area-inset-bottom));
      width: min(720px, calc(100% - 24px));
      max-height: 42vh;
      margin: 0 auto;
      padding: 14px 48px 14px 14px;
      overflow: auto;
      opacity: 0;
      pointer-events: none;
      transform: translateY(calc(100% + 24px));
      transition: transform .22s ease, opacity .18s ease;
      box-shadow: 0 18px 42px rgba(53,45,42,.22);
    }
    .map-sheet.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .map-sheet h3 { margin: 0 0 5px; color: var(--text-strong); }
    .map-sheet p { margin: 3px 0; font-size: 12px; color: var(--muted); }
    .map-sheet-actions { display: flex; gap: 7px; margin-top: 9px; flex-wrap: wrap; }
    .map-sheet-close { position: absolute; top: 9px; right: 9px; width: 34px; min-width: 34px; min-height: 34px; padding: 0; border-radius: 11px; }

    .category-add { display: grid; grid-template-columns: minmax(0,1fr) 58px auto; gap: 9px; align-items: end; margin-bottom: 15px; }
    .icon-picker-wrap { grid-column: 1 / -1; display: grid; gap: 7px; }
    .icon-picker-label { color: var(--text-strong); font-size: 14px; font-weight: 800; }
    .icon-picker { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 7px; }
    .icon-choice {
      min-width: 0;
      min-height: 62px;
      padding: 7px 3px 5px;
      border: 1px solid var(--line);
      border-radius: 13px;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 3px;
      color: var(--muted);
      background: var(--surface-soft);
    }
    .icon-choice svg { width: 23px; height: 23px; }
    .icon-choice span { width: 100%; font-size: 9px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .icon-choice.active { color: white; border-color: transparent; background: linear-gradient(145deg, var(--coral), var(--orange)); box-shadow: 0 7px 16px rgba(255,128,102,.22); }
    .color-input { width: 54px; padding: 5px; }
    .category-list { display: grid; gap: 9px; }
    .category-row { display: grid; grid-template-columns: 42px minmax(0,1fr) auto auto; gap: 8px; align-items: center; padding: 10px; border: 1px solid var(--line); border-radius: 15px; background: var(--surface-soft); }
    .category-icon { width: 40px; height: 40px; display: grid; place-items: center; border-radius: 13px; color: white; background: var(--category-color); }
    .category-icon svg { width: 21px; height: 21px; }
    .category-name { min-width: 0; }
    .category-name strong { display: block; color: var(--text-strong); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .category-name small { color: var(--muted); }
    .logout-wrap { display: flex; justify-content: center; margin-top: 18px; }

    .modal-backdrop { position: fixed; inset: 0; z-index: 200; display: grid; place-items: end center; background: rgba(38,36,44,.42); padding: 14px; }
    .modal { width: min(520px, 100%); max-height: 86vh; overflow: auto; padding: 18px; border-radius: 24px 24px 18px 18px; background: white; box-shadow: 0 22px 60px rgba(0,0,0,.24); }
    .modal h3 { margin: 0 0 14px; color: var(--text-strong); }

    .alert { padding: 11px 13px; border-radius: 13px; font-size: 13px; line-height: 1.55; }
    .alert-error { color: var(--danger); background: var(--danger-soft); }
    .alert-success { color: var(--mint-deep); background: var(--mint-soft); }
    #toast-root { position: fixed; z-index: 300; left: 50%; bottom: calc(96px + env(safe-area-inset-bottom)); transform: translateX(-50%); width: min(92vw, 430px); pointer-events: none; }
    .toast { margin-top: 8px; padding: 11px 14px; border-radius: 14px; color: white; background: #3b3943; box-shadow: var(--shadow); font-size: 13px; animation: toast-in .18s ease; }
    .toast.success { background: var(--mint-deep); }
    .toast.error { background: var(--danger); }
    @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } }

    @media (max-width: 640px) {
      .page { padding: 12px 11px 22px; }
      .form-grid.two { grid-template-columns: 1fr; }
      .bookmark-row { grid-template-columns: 82px minmax(0,1fr); gap: 9px; padding: 9px; }
      .bookmark-thumb { width: 82px; height: 82px; border-radius: 14px; }
      .category-add { grid-template-columns: minmax(0,1fr) 54px auto; }
      .icon-picker { grid-template-columns: repeat(4, minmax(0,1fr)); }
      .category-row { grid-template-columns: 38px minmax(0,1fr) auto auto; padding: 9px; }
      .category-icon { width: 38px; height: 38px; }
      .map-canvas { min-height: 58vh; }
      .place-map { min-height: 280px; }
      .form-actions .btn { flex: 1 1 120px; }
    }
  </style>
</head>

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function icon(name, className = "") {
      const paths = ICON_PATHS[name] || ICON_PATHS.other;
      return `<svg class="${escapeHtml(className)}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${paths}</svg>`;
    }

    function showToast(message, type = "") {
      const node = document.createElement("div");
      node.className = `toast ${type}`;
      node.textContent = message;
      toastRoot.append(node);
      setTimeout(() => node.remove(), 3200);
    }

    function confirmDialog(message) { return window.confirm(message); }

    function normalizeEmail(value) { return String(value || "").trim().toLowerCase(); }
    function isAllowedEmail(email) {
      return CONFIG.allowedEmails.map(normalizeEmail).includes(normalizeEmail(email));
    }

    function validateConfig() {
      const values = [...Object.values(CONFIG.firebase), CONFIG.googleMapsApiKey, CONFIG.googleMapsMapId];
      if (values.some((value) => !value || String(value).startsWith("請填入_"))) {
        throw new Error("請先在 index.html 的 CONFIG 填入 Firebase 與 Google Maps 設定值。");
      }
    }

    validateConfig();

    const firebaseApp = initializeApp(CONFIG.firebase);
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);
    const googleProvider = new GoogleAuthProvider();
    googleProvider.setCustomParameters({ prompt: "select_account" });
    await setPersistence(auth, browserLocalPersistence);

    const categoriesRef = () => collection(db, "workspaces", CONFIG.sharedWorkspaceId, "categories");
    const bookmarksRef = () => collection(db, "workspaces", CONFIG.sharedWorkspaceId, "bookmarks");

    function withId(snapshot) { return snapshot.docs.map((item) => ({ id: item.id, ...item.data() })); }

    async function seedCategories() {
      const existing = await getDocs(query(categoriesRef(), limit(1)));
      if (!existing.empty) return;
      const batch = writeBatch(db);
      DEFAULT_CATEGORIES.forEach(([id, name, iconName, color], index) => {
        batch.set(doc(categoriesRef(), id), {
          name,
          icon: iconName,
          color,
          sortOrder: index,
          system: id === "other",
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
      });
      await batch.commit();
    }

    async function loadCoreData(force = false) {
      if (state.loaded && !force) return;
      if (state.loadingPromise && !force) return state.loadingPromise;
      state.loadingPromise = (async () => {
        await seedCategories();
        const [categorySnapshot, bookmarkSnapshot] = await Promise.all([
          getDocs(query(categoriesRef(), orderBy("sortOrder", "asc"))),
          getDocs(query(bookmarksRef(), orderBy("createdAt", "desc"), limit(CONFIG.pageSize)))
        ]);
        state.categories = withId(categorySnapshot);
        state.bookmarks = withId(bookmarkSnapshot);
        state.loaded = true;
      })().finally(() => { state.loadingPromise = null; });
      return state.loadingPromise;
    }

    async function findDuplicate(normalizedUrl) {
      if (!normalizedUrl) return null;
      const snapshot = await getDocs(query(bookmarksRef(), where("normalizedUrl", "==", normalizedUrl), limit(1)));
      return snapshot.empty ? null : { id: snapshot.docs[0].id, ...snapshot.docs[0].data() };
    }

    async function createBookmark(data) {
      const result = await addDoc(bookmarksRef(), { ...data, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
      return result.id;
    }

    async function updateBookmark(id, data) {
      await updateDoc(doc(db, "workspaces", CONFIG.sharedWorkspaceId, "bookmarks", id), { ...data, updatedAt: serverTimestamp() });
    }

    async function deleteBookmark(id) {
      await deleteDoc(doc(db, "workspaces", CONFIG.sharedWorkspaceId, "bookmarks", id));
    }

    async function addCategory(data) {
      const result = await addDoc(categoriesRef(), {
        ...data,
        sortOrder: state.categories.length,
        system: false,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
      return result.id;
    }

    async function updateCategory(id, data) {
      await updateDoc(doc(db, "workspaces", CONFIG.sharedWorkspaceId, "categories", id), { ...data, updatedAt: serverTimestamp() });
    }

    async function deleteCategory(id) {
      const used = await getDocs(query(bookmarksRef(), where("categoryId", "==", id), limit(1)));
      if (!used.empty) throw new Error("這個分類仍有收藏使用中。請先逐筆修改收藏分類，或直接修改分類名稱。");
      await deleteDoc(doc(db, "workspaces", CONFIG.sharedWorkspaceId, "categories", id));
    }

    async function queryNearby(center, radiusKm) {
      const bounds = geohashQueryBounds([Number(center.latitude), Number(center.longitude)], Number(radiusKm) * 1000);
      const snapshots = await Promise.all(bounds.map(([start, end]) => getDocs(
        query(bookmarksRef(), orderBy("location.geohash"), startAt(start), endAt(end))
      )));
      const unique = new Map();
      snapshots.forEach((snapshot) => snapshot.docs.forEach((item) => {
        const bookmark = { id: item.id, ...item.data() };
        if (bookmark.hasLocation && bookmark.location?.latitude != null && bookmark.location?.longitude != null) unique.set(bookmark.id, bookmark);
      }));
      return [...unique.values()].map((bookmark) => ({
        ...bookmark,
        distanceKm: distanceBetween(
          [center.latitude, center.longitude],
          [Number(bookmark.location.latitude), Number(bookmark.location.longitude)]
        )
      })).filter((bookmark) => bookmark.distanceKm <= radiusKm).sort((a, b) => a.distanceKm - b.distanceKm);
    }

    function normalizeUrl(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      try {
        const url = new URL(raw);
        url.hash = "";
        [...url.searchParams.keys()].forEach((key) => {
          if (key.startsWith("utm_") || ["fbclid", "gclid", "igsh", "mibextid"].includes(key)) url.searchParams.delete(key);
        });
        return url.toString().replace(/\/$/, "");
      } catch { return raw; }
    }

    function detectPlatform(value) {
      try {
        const host = new URL(value).hostname.toLowerCase();
        if (host.includes("threads.net")) return "threads";
        if (host.includes("instagram.com")) return "instagram";
        if (host.includes("facebook.com") || host.includes("fb.watch")) return "facebook";
        if (host.includes("xiaohongshu.com") || host.includes("xhslink.com")) return "xiaohongshu";
        if (host.includes("tiktok.com")) return "tiktok";
        if (host.includes("youtube.com") || host.includes("youtu.be")) return "youtube";
      } catch {}
      return "other";
    }

    function inferThumbnailUrl(url, platform) {
      if (platform !== "youtube") return "";
      try {
        const parsed = new URL(url);
        let videoId = "";
        if (parsed.hostname.includes("youtu.be")) videoId = parsed.pathname.split("/").filter(Boolean)[0] || "";
        if (parsed.hostname.includes("youtube.com")) {
          videoId = parsed.searchParams.get("v") || "";
          if (!videoId && parsed.pathname.includes("/shorts/")) videoId = parsed.pathname.split("/shorts/")[1]?.split("/")[0] || "";
        }
        return videoId ? `https://i.ytimg.com/vi/${encodeURIComponent(videoId)}/hqdefault.jpg` : "";
      } catch { return ""; }
    }

    function parseTags(value) {
      return [...new Set(String(value || "").split(/[,，\n]/).map((item) => item.trim().replace(/^#/, "")).filter(Boolean))].slice(0, 20);
    }

    function formatDate(value) {
      const date = value?.toDate ? value.toDate() : value instanceof Date ? value : value ? new Date(value) : null;
      if (!date || Number.isNaN(date.getTime())) return "";
      return new Intl.DateTimeFormat("zh-TW", { year: "numeric", month: "2-digit", day: "2-digit" }).format(date);
    }

    function platformMeta(platform) { return PLATFORM_META[platform] || PLATFORM_META.other; }
    function categoryMap() { return new Map(state.categories.map((item) => [item.id, item])); }
    function categoryColor(category = {}) { return /^#[0-9a-f]{6}$/i.test(String(category.color || "")) ? category.color : "#9a96a1"; }
    function categoryIconName(category = {}) { return ICON_PATHS[category.icon] ? category.icon : "other"; }

    function getCurrentPosition() {
      if (!navigator.geolocation) return Promise.reject(new Error("此瀏覽器不支援定位功能。"));
      return new Promise((resolve, reject) => navigator.geolocation.getCurrentPosition(
        (position) => resolve({ latitude: position.coords.latitude, longitude: position.coords.longitude }),
        (error) => reject(new Error({ 1: "定位權限被拒絕，請在瀏覽器設定中允許定位。", 2: "目前無法取得位置。", 3: "取得位置逾時。" }[error.code] || "無法取得目前位置。")),
        { enableHighAccuracy: false, timeout: 12000, maximumAge: 120000 }
      ));
    }

    function cleanups() {
      state.cleanup.splice(0).forEach((callback) => { try { callback(); } catch {} });
    }

    function route() {
      const [path, id] = (location.hash || "#/home").replace(/^#\//, "").split("/");
      return { path: path || "home", id: id || "" };
    }

    function go(path) { location.hash = `#/${String(path).replace(/^#?\/?/, "")}`; }

    function nav(active) {
      const items = [
        ["home", "home", "收藏", ""],
        ["add", "plus", "新增", "add-nav"],
        ["map", "map", "地圖", ""],
        ["settings", "user", "我的", ""]
      ];
      return items.map(([key, iconName, label, extra]) => `<button class="nav-item ${active === key ? "active" : ""} ${extra}" data-nav="${key}">${icon(iconName)}<span>${label}</span></button>`).join("");
    }

    function removeBottomNav() {
      document.querySelector("#app-bottom-nav")?.remove();
    }

    function mountBottomNav(active) {
      removeBottomNav();
      const navNode = document.createElement("nav");
      navNode.id = "app-bottom-nav";
      navNode.className = "bottom-nav";
      navNode.innerHTML = nav(active);
      document.body.append(navNode);
      navNode.querySelectorAll("[data-nav]").forEach((button) => button.addEventListener("click", () => go(button.dataset.nav)));
    }

    function shell({ title, subtitle = "", active, content }) {
      appRoot.innerHTML = `<div class="app-shell">
        <header class="topbar"><div class="top-title"><div class="brand-mark">▶</div><div class="top-copy"><strong>${escapeHtml(title)}</strong>${subtitle ? `<small>${escapeHtml(subtitle)}</small>` : ""}</div></div></header>
        <main class="page">${content}</main>
      </div>`;
      mountBottomNav(active);
    }

    function renderLogin(error = "") {
      cleanups();
      removeBottomNav();
      appRoot.innerHTML = `<div class="login-page"><section class="login-card"><div class="brand-mark">▶</div><h1>短影音收藏中心</h1><p>共同收藏短影音、分類整理，並在地圖查看附近景點與餐廳。</p>${error ? `<div class="alert alert-error">${escapeHtml(error)}</div>` : ""}<button id="login" class="btn google-btn">G　使用 Google 帳號登入</button></section></div>`;
      document.querySelector("#login").addEventListener("click", async (event) => {
        try {
          event.currentTarget.disabled = true;
          await signInWithPopup(auth, googleProvider);
        } catch (loginError) {
          console.error(loginError);
          renderLogin(loginError?.message || "登入失敗。");
        }
      });
    }

    function categoryOptions(selected = "") {
      return state.categories.map((category) => `<option value="${escapeHtml(category.id)}" ${category.id === selected ? "selected" : ""}>${escapeHtml(category.name)}</option>`).join("");
    }

    function iconPicker(inputId, selected = "other") {
      return `<div class="icon-picker-wrap"><span class="icon-picker-label">圖示</span><div class="icon-picker" data-icon-target="${escapeHtml(inputId)}">${ICON_OPTIONS.map(([value, label]) => `<button type="button" class="icon-choice ${value === selected ? "active" : ""}" data-icon-value="${escapeHtml(value)}" aria-label="${escapeHtml(label)}" title="${escapeHtml(label)}">${icon(value)}<span>${escapeHtml(label)}</span></button>`).join("")}</div><input id="${escapeHtml(inputId)}" type="hidden" value="${escapeHtml(selected)}" /></div>`;
    }

    function bindIconPickers(root = document) {
      root.querySelectorAll(".icon-picker[data-icon-target]").forEach((picker) => {
        const input = root.querySelector(`#${picker.dataset.iconTarget}`);
        if (!input) return;
        picker.querySelectorAll("[data-icon-value]").forEach((button) => button.addEventListener("click", () => {
          input.value = button.dataset.iconValue;
          picker.querySelectorAll("[data-icon-value]").forEach((item) => item.classList.toggle("active", item === button));
        }));
      });
    }

    function fallbackThumb(platform) {
      const meta = platformMeta(platform);
      return `<div class="platform-fallback"><span>${escapeHtml(meta.short)}</span><span>${escapeHtml(meta.label)}</span></div>`;
    }

    function bookmarkRow(bookmark) {
      const categories = categoryMap();
      const category = categories.get(bookmark.categoryId) || { name: "其他", icon: "other", color: "#9a96a1" };
      const image = bookmark.thumbnailUrl ? `<img src="${escapeHtml(bookmark.thumbnailUrl)}" alt="" loading="lazy" data-thumb-platform="${escapeHtml(bookmark.platform)}" />` : fallbackThumb(bookmark.platform);
      return `<article class="bookmark-row card">
        <div class="bookmark-thumb">${image}</div>
        <div class="bookmark-content">
          <h3 class="bookmark-title">${escapeHtml(bookmark.title || "未命名收藏")}</h3>
          <div class="bookmark-meta">
            <span class="category-pill" style="--category-color:${escapeHtml(categoryColor(category))}">${icon(categoryIconName(category))}${escapeHtml(category.name)}</span>
            <span class="meta-item">${escapeHtml(platformMeta(bookmark.platform).label)}</span>
            ${bookmark.location?.placeName ? `<span class="meta-item">${icon("location")}${escapeHtml(bookmark.location.placeName)}</span>` : ""}
            ${bookmark.createdAt ? `<span class="meta-item">${formatDate(bookmark.createdAt)}</span>` : ""}
          </div>
          ${bookmark.tags?.length ? `<div class="tag-line">${bookmark.tags.map((tag) => `#${escapeHtml(tag)}`).join("　")}</div>` : ""}
          <div class="bookmark-actions">
            <a class="btn btn-small btn-soft" href="${escapeHtml(bookmark.url)}" target="_blank" rel="noreferrer">${icon("play")}開啟</a>
            <button class="btn btn-small btn-secondary" data-edit-bookmark="${bookmark.id}">${icon("edit")}編輯</button>
            <button class="btn btn-small btn-icon btn-danger" data-delete-bookmark="${bookmark.id}" aria-label="刪除">${icon("trash")}</button>
          </div>
        </div>
      </article>`;
    }

    function bindBookmarkRows(refresh) {
      document.querySelectorAll("img[data-thumb-platform]").forEach((image) => image.addEventListener("error", () => { image.parentElement.innerHTML = fallbackThumb(image.dataset.thumbPlatform); }, { once: true }));
      document.querySelectorAll("[data-edit-bookmark]").forEach((button) => button.addEventListener("click", () => go(`edit/${button.dataset.editBookmark}`)));
      document.querySelectorAll("[data-delete-bookmark]").forEach((button) => button.addEventListener("click", async () => {
        const bookmark = state.bookmarks.find((item) => item.id === button.dataset.deleteBookmark);
        if (!bookmark || !confirmDialog(`確定刪除「${bookmark.title}」？`)) return;
        try {
          button.disabled = true;
          await deleteBookmark(bookmark.id);
          state.bookmarks = state.bookmarks.filter((item) => item.id !== bookmark.id);
          showToast("收藏已刪除。", "success");
          refresh();
        } catch (error) { showToast(error?.message || "刪除失敗。", "error"); button.disabled = false; }
      }));
    }

    async function renderHome() {
      cleanups();
      await loadCoreData();
      const local = { search: "", categoryId: "", sort: "newest" };
      shell({
        title: "我的收藏",
        subtitle: "手機快速瀏覽與整理",
        active: "home",
        content: `<div class="toolbar"><div class="search-wrap">${icon("search")}<input id="home-search" type="search" placeholder="搜尋標題、標籤、備註或地點" /></div><select id="home-sort" style="width:auto"><option value="newest">最新加入</option><option value="name">名稱排序</option></select></div>
          <div class="chips"><button class="chip active" data-filter="">全部</button>${state.categories.map((category) => `<button class="chip" style="--chip-color:${escapeHtml(categoryColor(category))}" data-filter="${category.id}">${escapeHtml(category.name)}</button>`).join("")}</div>
          <div id="bookmark-list" class="bookmark-list"></div>`
      });

      const list = document.querySelector("#bookmark-list");
      const refresh = () => {
        let records = [...state.bookmarks];
        if (local.categoryId) records = records.filter((item) => item.categoryId === local.categoryId);
        const keyword = local.search.toLowerCase();
        if (keyword) records = records.filter((item) => [item.title, item.note, item.location?.placeName, item.location?.address, ...(item.tags || [])].join(" ").toLowerCase().includes(keyword));
        if (local.sort === "name") records.sort((a, b) => String(a.title || "").localeCompare(String(b.title || ""), "zh-Hant"));
        else records.sort((a, b) => {
          const ta = a.createdAt?.toMillis ? a.createdAt.toMillis() : 0;
          const tb = b.createdAt?.toMillis ? b.createdAt.toMillis() : 0;
          return tb - ta;
        });

    let mapsPromise = null;
    function loadGoogleMaps() {
      if (window.google?.maps?.Map) return Promise.resolve(window.google.maps);
      if (mapsPromise) return mapsPromise;

      mapsPromise = new Promise((resolve, reject) => {
        const callback = `__mapsReady_${Date.now()}`;
        let settled = false;
        let authFailed = false;
        const finishReject = (message) => {
          if (settled) return;
          settled = true;
          mapsPromise = null;
          reject(new Error(message));
        };
        const timer = setTimeout(() => finishReject("Google Maps 載入逾時。請檢查帳單、Maps JavaScript API 與網站限制。"), 20000);

        const previousAuthFailure = window.gm_authFailure;
        window.gm_authFailure = () => {
          authFailed = true;
          clearTimeout(timer);
          finishReject("Google Maps 驗證失敗。請確認帳單已連結、Maps JavaScript API 已啟用，且 API 金鑰允許 https://baritone90064.github.io/*。");
          if (typeof previousAuthFailure === "function") previousAuthFailure();
        };

        window[callback] = () => {
          clearTimeout(timer);
          delete window[callback];
          setTimeout(() => {
            if (authFailed) return;
            if (!window.google?.maps?.Map) return finishReject("Google Maps 程式庫未正確載入。");
            if (settled) return;
            settled = true;
            resolve(window.google.maps);
          }, 250);
        };

        const script = document.createElement("script");
        const params = new URLSearchParams({
          key: CONFIG.googleMapsApiKey,
          v: "weekly",
          language: "zh-TW",
          region: "TW",
          callback,
          loading: "async"
        });
        script.src = `https://maps.googleapis.com/maps/api/js?${params.toString()}`;
        script.async = true;
        script.defer = true;
        script.onerror = () => {
          clearTimeout(timer);
          finishReject("Google Maps JavaScript 無法下載。");
        };
        document.head.append(script);
      });
      return mapsPromise;
    }

    let leafletPromise = null;
    function loadLeaflet() {
      if (window.L?.map) return Promise.resolve(window.L);
      if (leafletPromise) return leafletPromise;
      leafletPromise = new Promise((resolve, reject) => {
        if (!document.querySelector('link[data-leaflet]')) {
          const css = document.createElement("link");
          css.rel = "stylesheet";
          css.href = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.css";
          css.dataset.leaflet = "true";
          document.head.append(css);
        }
        const script = document.createElement("script");
        script.src = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
        script.async = true;
        script.onload = () => window.L?.map ? resolve(window.L) : reject(new Error("備援地圖程式庫載入失敗。"));
        script.onerror = () => reject(new Error("備援地圖程式庫無法下載。"));
        document.head.append(script);
      });
      return leafletPromise;
    }

    const PLUS_ALPHABET = "23456789CFGHJMPQRVWX";
    const PAIR_RESOLUTIONS = [20, 1, 0.05, 0.0025, 0.000125];

    function parseCoordinateText(raw) {
      const cleaned = String(raw || "")
        .trim()
        .replace(/[()（）]/g, "")
        .replace(/[，、；;]/g, ",");
      const match = cleaned.match(/^\s*([+-]?\d+(?:\.\d+)?)\s*[, ]\s*([+-]?\d+(?:\.\d+)?)\s*$/);
      if (!match) return null;
      const latitude = Number(match[1]);
      const longitude = Number(match[2]);
      if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) return null;
      if (latitude < -90 || latitude > 90 || longitude < -180 || longitude > 180) return null;
      return { latitude, longitude };
    }

    function extractPlusCode(raw) {
      const candidate = String(raw || "").trim().toUpperCase().split(/[\s,，]/)[0];
      return candidate.replace(/[^23456789CFGHJMPQRVWX+0]/g, "");
    }

    function decodeFullPlusCode(raw) {
      const code = extractPlusCode(raw);
      if (!/^[23456789CFGHJMPQRVWX]{8}\+[23456789CFGHJMPQRVWX]{2,7}$/.test(code)) return null;
      const clean = code.replace("+", "").replace(/0/g, "");
      let latitudeLo = -90;
      let longitudeLo = -180;
      let latitudeResolution = 20;
      let longitudeResolution = 20;
      const pairLength = Math.min(clean.length, 10);
      for (let i = 0; i < pairLength; i += 2) {
        const latitudeIndex = PLUS_ALPHABET.indexOf(clean[i]);
        const longitudeIndex = PLUS_ALPHABET.indexOf(clean[i + 1]);
        if (latitudeIndex < 0 || longitudeIndex < 0) return null;
        const resolution = PAIR_RESOLUTIONS[i / 2];
        latitudeLo += latitudeIndex * resolution;
        longitudeLo += longitudeIndex * resolution;
        latitudeResolution = resolution;
        longitudeResolution = resolution;
      }
      for (let i = 10; i < clean.length; i += 1) {
        const index = PLUS_ALPHABET.indexOf(clean[i]);
        if (index < 0) return null;
        latitudeResolution /= 5;
        longitudeResolution /= 4;
        latitudeLo += Math.floor(index / 4) * latitudeResolution;
        longitudeLo += (index % 4) * longitudeResolution;
      }
      return {
        latitude: Number((latitudeLo + latitudeResolution / 2).toFixed(7)),
        longitude: Number((longitudeLo + longitudeResolution / 2).toFixed(7))
      };
    }

    async function resolveCoordinateOrPlusCode(raw) {
      const coordinates = parseCoordinateText(raw);
      if (coordinates) return coordinates;

      const fullPlusCode = decodeFullPlusCode(raw);
      if (fullPlusCode) return fullPlusCode;

      if (String(raw || "").includes("+")) {
        try {
          await loadGoogleMaps();
          const geocoder = new google.maps.Geocoder();
          const response = await geocoder.geocode({ address: String(raw).trim(), region: "TW" });
          const location = response.results?.[0]?.geometry?.location;
          if (location) return { latitude: location.lat(), longitude: location.lng() };
        } catch (error) {
          console.warn("Plus Code geocoding failed:", error);
        }
        throw new Error("這個 Plus Code 無法直接解析。請貼上完整 Plus Code，或改貼「緯度, 經度」。");
      }

      throw new Error("請貼上「緯度, 經度」，例如 (24.3523330, 121.7377273)，或貼上完整 Plus Code。");
    }

    function formatCoordinate(latitude, longitude) {
      if (latitude == null || longitude == null || String(latitude).trim() === "" || String(longitude).trim() === "") return "";
      const lat = Number(latitude);
      const lng = Number(longitude);
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return "";
      return `(${lat.toFixed(7)}, ${lng.toFixed(7)})`;
    }

          if (duplicate && duplicate.id !== existing?.id) throw new Error(`這個連結已收藏：${duplicate.title || "未命名收藏"}`);

          const hasCoordinates = Number.isFinite(Number(placeState.latitude)) && Number.isFinite(Number(placeState.longitude));
          const hasAnyLocation = Boolean(placeState.placeName || placeState.address || coordinateInput.value.trim());
          if (hasAnyLocation && !hasCoordinates) throw new Error("若要加入地點，請貼上有效的「緯度, 經度」或完整 Plus Code。");

          const platform = platformSelect.value;
          const input = {
            url,

              placeId: placeState.placeId || ""
            } : null

          const category = categories.get(bookmark.categoryId) || { color: "#9a96a1" };
          controller.addBookmark(bookmark, categoryColor(category), () => {
            sheet.innerHTML = `<button type="button" class="btn btn-icon btn-secondary map-sheet-close" aria-label="關閉">×</button><h3>${escapeHtml(bookmark.title)}</h3><p>${escapeHtml(bookmark.location.placeName || "自訂地點")}${bookmark.distanceKm != null ? `・${bookmark.distanceKm.toFixed(bookmark.distanceKm < 10 ? 1 : 0)} km` : ""}</p>${bookmark.location.address ? `<p>${escapeHtml(bookmark.location.address)}</p>` : ""}<div class="map-sheet-actions"><a class="btn btn-small btn-soft" href="${escapeHtml(bookmark.url)}" target="_blank" rel="noreferrer">${icon("play")}開啟影片</a><a class="btn btn-small btn-primary" href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(`${bookmark.location.latitude},${bookmark.location.longitude}`)}" target="_blank" rel="noreferrer">${icon("navigation")}導航</a></div>`;
            sheet.classList.add("show");
            sheet.querySelector(".map-sheet-close")?.addEventListener("click", () => sheet.classList.remove("show"));
          });
        });

        sheet.classList.remove("show");
        sheet.innerHTML = "";
        if (!records.length) showStatus("這個範圍內沒有符合分類的收藏。");
      };

      const searchCenter = async (center) => {
        try {
          showStatus("正在搜尋附近收藏…");
          selected.center = center;
          selected.records = await queryNearby(center, Number(document.querySelector("#map-radius").value));
          renderMarkers();
          if (selected.records.length) showStatus("");
        } catch (error) {
          console.error(error);
          showStatus(error?.message || "搜尋失敗。");
        }
      };

      try {
        showStatus("正在載入地圖…");
        let start = { ...CONFIG.defaultCenter };
        try { start = await getCurrentPosition(); } catch {}
        selected.center = start;
        const node = document.querySelector("#main-map");

        try {
          controller = await createGoogleController(node, start);
          providerNote.textContent = "地圖來源：Google Maps";
        } catch (googleError) {
          console.error("Google Maps failed:", googleError);
          node.innerHTML = "";
          controller = await createLeafletController(node, start);
          providerNote.textContent = `Google Maps 尚未通過驗證，已自動切換備援地圖。${googleError?.message ? ` ${googleError.message}` : ""}`;
        }

        state.cleanup.push(() => controller?.destroy?.());
        await searchCenter(start);
      } catch (error) {
        console.error(error);
        showStatus(error?.message || "地圖載入失敗。");
      }

      document.querySelector("#search-area").addEventListener("click", () => {
        if (!controller) return;
        searchCenter(controller.getCenter());
      });

      document.querySelector("#current-location").addEventListener("click", async () => {
        try {
          const position = await getCurrentPosition();
          controller?.panTo(position);
          controller?.setZoom(13);
          controller?.setCurrentPosition(position);
          await searchCenter(position);
        } catch (error) {
          showToast(error?.message || "無法取得位置。", "error");
        }
      });

      document.querySelector("#map-radius").addEventListener("change", () => searchCenter(selected.center));
      document.querySelectorAll("[data-map-category]").forEach((button) => button.addEventListener("click", () => {
        selected.categoryId = button.dataset.mapCategory;
        document.querySelectorAll("[data-map-category]").forEach((item) => item.classList.toggle("active", item === button));
        renderMarkers();
      }));
    }

    function openModal(content, onReady) {
      const backdrop = document.createElement("div");
      backdrop.className = "modal-backdrop";
      backdrop.innerHTML = `<section class="modal">${content}</section>`;
      document.body.append(backdrop);
      const close = () => backdrop.remove();
      backdrop.addEventListener("click", (event) => { if (event.target === backdrop) close(); });
      onReady?.(backdrop, close);
    }

    function openEditCategory(category) {
      openModal(`<h3>編輯分類</h3><div class="form-grid"><label class="field">分類名稱<input id="edit-category-name" maxlength="20" value="${escapeHtml(category.name)}" /></label>${iconPicker("edit-category-icon", categoryIconName(category))}<label class="field">顏色<input id="edit-category-color" type="color" value="${escapeHtml(categoryColor(category))}" /></label></div><div class="form-actions"><button class="btn btn-secondary" id="cancel-category">取消</button><button class="btn btn-primary" id="save-category">儲存</button></div>`, (root, close) => {
        bindIconPickers(root);
        root.querySelector("#cancel-category").addEventListener("click", close);
        root.querySelector("#save-category").addEventListener("click", async (event) => {
          const name = root.querySelector("#edit-category-name").value.trim();
          if (!name) return showToast("分類名稱不可空白。", "error");
          try {
            event.currentTarget.disabled = true;
            const patch = { name, icon: root.querySelector("#edit-category-icon").value, color: root.querySelector("#edit-category-color").value };
            await updateCategory(category.id, patch);
            Object.assign(category, patch);
            close();
            showToast("分類已更新。", "success");
            renderSettings();
          } catch (error) { showToast(error?.message || "更新失敗。", "error"); event.currentTarget.disabled = false; }
        });
      });
    }

    async function renderSettings() {
      cleanups();
      await loadCoreData();
      const counts = new Map();
      state.bookmarks.forEach((bookmark) => counts.set(bookmark.categoryId, (counts.get(bookmark.categoryId) || 0) + 1));
      shell({
        title: "分類管理",
        subtitle: "共同管理收藏分類",
        active: "settings",
        content: `<section class="card panel"><div class="section-head"><div class="section-title"><span class="section-icon">${icon("settings")}</span><h2>分類管理</h2></div><span class="small muted">${state.categories.length} 個分類</span></div>
          <form id="add-category-form" class="category-add"><label class="field">新增分類<input id="new-category-name" maxlength="20" placeholder="分類名稱" required /></label><label class="field">顏色<input id="new-category-color" class="color-input" type="color" value="#ff8066" aria-label="分類顏色" /></label><button class="btn btn-primary" type="submit">${icon("plus")}新增</button>${iconPicker("new-category-icon", "sparkles")}</form>
          <div class="category-list">${state.categories.map((category) => `<div class="category-row"><span class="category-icon" style="--category-color:${escapeHtml(categoryColor(category))}">${icon(categoryIconName(category))}</span><div class="category-name"><strong>${escapeHtml(category.name)}</strong><small>${counts.get(category.id) || 0} 筆收藏</small></div><button class="btn btn-small btn-icon btn-secondary" data-edit-category="${category.id}" aria-label="編輯">${icon("edit")}</button><button class="btn btn-small btn-icon btn-danger" data-delete-category="${category.id}" ${category.system ? "disabled" : ""} aria-label="刪除">${icon("trash")}</button></div>`).join("")}</div>
        </section><div class="logout-wrap"><button id="logout" class="btn btn-secondary">${icon("logout")}登出</button></div>`
      });

      bindIconPickers(document);
      document.querySelector("#logout").addEventListener("click", () => signOut(auth));
      document.querySelector("#add-category-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const name = document.querySelector("#new-category-name").value.trim();
        if (!name) return;
        try {
          const selectedIcon = document.querySelector("#new-category-icon").value || "sparkles";
          const selectedColor = document.querySelector("#new-category-color").value;
          const id = await addCategory({ name, icon: selectedIcon, color: selectedColor });
          state.categories.push({ id, name, icon: selectedIcon, color: selectedColor, sortOrder: state.categories.length, system: false });
          showToast("分類已新增。", "success");
          renderSettings();
        } catch (error) { showToast(error?.message || "新增分類失敗。", "error"); }
      });
      document.querySelectorAll("[data-edit-category]").forEach((button) => button.addEventListener("click", () => {
        const category = state.categories.find((item) => item.id === button.dataset.editCategory);
        if (category) openEditCategory(category);
      }));
      document.querySelectorAll("[data-delete-category]").forEach((button) => button.addEventListener("click", async () => {
        const category = state.categories.find((item) => item.id === button.dataset.deleteCategory);
        if (!category || !confirmDialog(`確定刪除分類「${category.name}」？`)) return;
        try {
          button.disabled = true;
          await deleteCategory(category.id);
          state.categories = state.categories.filter((item) => item.id !== category.id);
          showToast("分類已刪除。", "success");
          renderSettings();
        } catch (error) { showToast(error?.message || "刪除失敗。", "error"); button.disabled = false; }
      }));
    }

    async function renderRoute() {
      if (!state.user) return renderLogin();
      const current = route();
      try {
        if (current.path === "home") return renderHome();
        if (current.path === "add") return renderBookmarkForm();
        if (current.path === "edit") return renderBookmarkForm(current.id);
        if (current.path === "map") return renderMap();
        if (current.path === "settings") return renderSettings();
        go("home");
      } catch (error) {
        console.error(error);
        shell({ title: "發生錯誤", active: "home", content: `<div class="alert alert-error">${escapeHtml(error?.message || "載入失敗。")}</div>` });
      }
    }

    window.addEventListener("hashchange", renderRoute);
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        state.user = null;
        state.loaded = false;
        state.categories = [];
        state.bookmarks = [];
        renderLogin();
        return;
      }
      if (!isAllowedEmail(user.email)) {
        await signOut(auth);
        renderLogin("此帳號未被授權使用本 App。");
        return;
      }
      state.user = user;
      removeBottomNav();
      appRoot.innerHTML = `<div class="boot"><div class="boot-inner"><div class="brand-mark">▶</div><strong>正在同步收藏…</strong><div class="spinner"></div></div></div>`;
      try {
        await loadCoreData();
        if (!location.hash) location.hash = "#/home";
        else renderRoute();
      } catch (error) {
        console.error(error);
        renderLogin(error?.message || "無法讀取資料。");
      }
    });
  </script>
</body>
</html>
